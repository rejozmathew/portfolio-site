<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="0" y="0" width="720" height="220" rx="8" fill="#f0f4f8" stroke="#d1d9e0" stroke-width="0.8"/>
  <text x="360" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">FAST vs Conventional Two-Way</text>
  <rect x="20" y="38" width="330" height="165" rx="6" fill="#ffffff" stroke="#d1d9e0" stroke-width="0.6"/>
  <text x="185" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#c0392b">Conventional (for example B&amp;W 606)</text>
  <rect x="40" y="70" width="90" height="28" rx="4" fill="#1f4e79"/>
  <text x="85" y="88" text-anchor="middle" font-size="8" fill="#f9fafb">Woofer 6.5 in</text>
  <rect x="40" y="105" width="90" height="28" rx="4" fill="#2a7f62"/>
  <text x="85" y="123" text-anchor="middle" font-size="8" fill="#f9fafb">Tweeter 1 in</text>
  <text x="185" y="84" text-anchor="middle" font-size="8" fill="#c0392b">Crossover at 2-4 kHz</text>
  <text x="185" y="96" text-anchor="middle" font-size="7" fill="#c0392b">In the vocal band</text>
  <text x="185" y="130" text-anchor="middle" font-size="7" fill="#6b7280">Phase rotation plus radiation shift</text>
  <text x="185" y="150" text-anchor="middle" font-size="7" fill="#6b7280">Needs subwoofer for below 50 Hz</text>
  <text x="185" y="185" text-anchor="middle" font-size="8" font-weight="600" fill="#c0392b">Two sources in the vocal band</text>
  <rect x="370" y="38" width="330" height="165" rx="6" fill="#ffffff" stroke="#d1d9e0" stroke-width="0.6"/>
  <text x="535" y="58" text-anchor="middle" font-size="9" font-weight="600" fill="#2a7f62">FAST (This Build)</text>
  <rect x="390" y="70" width="90" height="28" rx="4" fill="#2a7f62"/>
  <text x="435" y="84" text-anchor="middle" font-size="7" fill="#f9fafb">Full-range 4 in</text>
  <text x="435" y="94" text-anchor="middle" font-size="6" fill="#a8dfc9">300 Hz to 20 kHz</text>
  <rect x="390" y="105" width="90" height="28" rx="4" fill="#1f4e79"/>
  <text x="435" y="119" text-anchor="middle" font-size="7" fill="#f9fafb">Subwoofer 8 in</text>
  <text x="435" y="129" text-anchor="middle" font-size="6" fill="#a8c4e0">Below 200 Hz</text>
  <text x="535" y="84" text-anchor="middle" font-size="8" fill="#2a7f62">Broad crossover region</text>
  <text x="535" y="96" text-anchor="middle" font-size="7" fill="#2a7f62">Well below the vocal band</text>
  <text x="535" y="130" text-anchor="middle" font-size="7" fill="#6b7280">Single point source across</text>
  <text x="535" y="150" text-anchor="middle" font-size="7" fill="#6b7280">the vocal range, bass to 30 Hz</text>
  <text x="535" y="185" text-anchor="middle" font-size="8" font-weight="600" fill="#2a7f62">One source for everything you hear</text>
</svg>
