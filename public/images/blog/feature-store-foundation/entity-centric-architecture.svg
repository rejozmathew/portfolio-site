<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1F4E79;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#183D5E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A7F62;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E6B50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D4F5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C47F17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A66914;stop-opacity:1" />
    </linearGradient>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2C3E50" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#90A4AE"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2A7F62"/>
    </marker>
  </defs>

  <rect width="820" height="680" fill="#f9fafb"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" fill="#2C3E50" font-size="14" font-weight="700" letter-spacing="1.5">ENTITY-CENTRIC FEATURE ARCHITECTURE</text>
  <text x="410" y="46" text-anchor="middle" fill="#546E7A" font-size="10">Every feature anchored to an entity and a time grain, with dimensional context</text>

  <!-- ════════════ ROW 1: Dimension Tables ════════════ -->
  <text x="56" y="80" fill="#546E7A" font-size="9" font-weight="600" letter-spacing="1.2">DIMENSIONS</text>

  <rect x="160" y="66" width="180" height="38" rx="6" fill="url(#slateGrad)" filter="url(#ds)"/>
  <text x="250" y="90" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">Product / Portfolio</text>

  <rect x="480" y="66" width="180" height="38" rx="6" fill="url(#slateGrad)" filter="url(#ds)"/>
  <text x="570" y="90" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">Time Snapshot</text>

  <!-- Dashed tier separator -->
  <line x1="50" y1="118" x2="770" y2="118" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ════════════ ROW 2: Customer Master ════════════ -->
  <text x="56" y="152" fill="#1F4E79" font-size="9" font-weight="600" letter-spacing="1.2">IDENTITY</text>

  <rect x="310" y="136" width="200" height="38" rx="6" fill="url(#navyGrad)" filter="url(#ds)"/>
  <text x="410" y="160" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="600">Customer Master</text>

  <!-- Arrow: Customer Master → Cross-Ref -->
  <line x1="410" y1="174" x2="410" y2="204" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ════════════ ROW 3: Cross-Reference ════════════ -->
  <rect x="280" y="210" width="260" height="38" rx="6" fill="url(#navyGrad)" filter="url(#ds)"/>
  <text x="410" y="234" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">Customer – Account Cross-Reference</text>

  <!-- Cardinality labels on the two arrows going down -->
  <!-- Arrow: Cross-Ref → Account Entity (left branch) -->
  <line x1="340" y1="248" x2="230" y2="308" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="268" y="274" fill="#546E7A" font-size="9" font-style="italic">1 : N</text>

  <!-- Arrow: Cross-Ref → Customer Entity (right branch) -->
  <line x1="480" y1="248" x2="590" y2="308" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="548" y="274" fill="#546E7A" font-size="9" font-style="italic">1 : 1</text>

  <!-- ════════════ ROW 4: Support Structures feeding Account ════════════ -->
  <!-- Credit Bureau Snapshot -->
  <rect x="36" y="278" width="140" height="38" rx="6" fill="url(#amberGrad)" filter="url(#ds)"/>
  <text x="106" y="302" text-anchor="middle" fill="#fff" font-size="10" font-weight="500">Credit Bureau Data</text>

  <!-- Trade-line Snapshot -->
  <rect x="36" y="324" width="140" height="38" rx="6" fill="url(#amberGrad)" filter="url(#ds)"/>
  <text x="106" y="348" text-anchor="middle" fill="#fff" font-size="10" font-weight="500">Trade-line Data</text>

  <!-- Arrows: Support → Account Entity box -->
  <line x1="176" y1="297" x2="196" y2="330" stroke="#90A4AE" stroke-width="1.2" marker-end="url(#arrowGray)"/>
  <line x1="176" y1="343" x2="196" y2="348" stroke="#90A4AE" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- ════════════ ACCOUNT ENTITY (left) ════════════ -->
  <rect x="200" y="314" width="240" height="210" rx="10" fill="url(#tealGrad)" filter="url(#ds)"/>
  <text x="320" y="340" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">ACCOUNT ENTITY</text>
  <text x="320" y="356" text-anchor="middle" fill="#fff" font-size="9" opacity="0.7">Grain: Account × Snapshot Date</text>

  <!-- Category rows inside -->
  <rect x="214" y="368" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="320" y="384" text-anchor="middle" fill="#fff" font-size="9.5">Account Info &amp; Status</text>

  <rect x="214" y="394" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="320" y="410" text-anchor="middle" fill="#fff" font-size="9.5">Balance &amp; Transaction Activity</text>

  <rect x="214" y="420" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="320" y="436" text-anchor="middle" fill="#fff" font-size="9.5">Credit Bureau &amp; Scores</text>

  <rect x="214" y="446" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="320" y="462" text-anchor="middle" fill="#fff" font-size="9.5">Fraud &amp; Risk Indicators</text>

  <rect x="214" y="472" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="320" y="488" text-anchor="middle" fill="#fff" font-size="9.5">Collections / Bankruptcy</text>

  <rect x="214" y="498" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="320" y="514" text-anchor="middle" fill="#fff" font-size="9.5">Payments / Fees / Disbursements</text>

  <!-- ════════════ CUSTOMER ENTITY (right) ════════════ -->
  <rect x="480" y="314" width="240" height="210" rx="10" fill="url(#tealGrad)" filter="url(#ds)"/>
  <text x="600" y="340" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" letter-spacing="1">CUSTOMER ENTITY</text>
  <text x="600" y="356" text-anchor="middle" fill="#fff" font-size="9" opacity="0.7">Grain: Customer × Snapshot Date</text>

  <rect x="494" y="368" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="600" y="384" text-anchor="middle" fill="#fff" font-size="9.5">Relationship &amp; Product Holdings</text>

  <rect x="494" y="394" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="600" y="410" text-anchor="middle" fill="#fff" font-size="9.5">Demographics</text>

  <rect x="494" y="420" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="600" y="436" text-anchor="middle" fill="#fff" font-size="9.5">Online &amp; Mobile Activity</text>

  <rect x="494" y="446" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="600" y="462" text-anchor="middle" fill="#fff" font-size="9.5">Voice &amp; Call Center</text>

  <rect x="494" y="472" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="600" y="488" text-anchor="middle" fill="#fff" font-size="9.5">Complaints &amp; Disputes</text>

  <rect x="494" y="498" width="212" height="22" rx="4" fill="#fff" opacity="0.12"/>
  <text x="600" y="514" text-anchor="middle" fill="#fff" font-size="9.5">Lifetime Aggregated Counts</text>

  <!-- ════════════ Dimension connectors (dashed) ════════════ -->
  <!-- Product dim → Account entity -->
  <line x1="250" y1="104" x2="250" y2="312" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <!-- Time dim → both entities -->
  <line x1="570" y1="104" x2="570" y2="168" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="168" x2="740" y2="168" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="740" y1="168" x2="740" y2="418" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- small ticks to both entities -->
  <line x1="740" y1="380" x2="722" y2="380" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <line x1="740" y1="418" x2="442" y2="418" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

  <!-- Dim labels on connectors -->
  <text x="756" y="384" fill="#546E7A" font-size="8" font-style="italic">time key</text>
  <text x="580" y="434" fill="#546E7A" font-size="8" font-style="italic">time key</text>
  <text x="232" y="214" fill="#546E7A" font-size="8" font-style="italic" transform="rotate(-90,232,214)">product key</text>

  <!-- ════════════ Bottom: Key Principle ════════════ -->
  <line x1="50" y1="546" x2="770" y2="546" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="56" y="576" fill="#1F4E79" font-size="10" font-weight="600" letter-spacing="1">KEY PRINCIPLES</text>
  <text x="56" y="598" fill="#2C3E50" font-size="10.5">Every feature has a two-part key: <tspan font-weight="600">(entity_id, snapshot_date)</tspan> — who and when.</text>
  <text x="56" y="618" fill="#2C3E50" font-size="10.5">The cross-reference enables roll-up from account-level to customer-level features.</text>
  <text x="56" y="638" fill="#2C3E50" font-size="10.5">Support structures (credit bureau, trade-line data) enrich entity snapshots without breaking the grain.</text>
  <text x="56" y="658" fill="#2C3E50" font-size="10.5">Dimension tables (product, time) provide the join keys for slicing and point-in-time retrieval.</text>

  <!-- Side labels -->
  <text x="26" y="90" text-anchor="middle" fill="#546E7A" font-size="9" font-weight="600" transform="rotate(-90, 26, 90)">DIMS</text>
  <text x="26" y="190" text-anchor="middle" fill="#1F4E79" font-size="9" font-weight="600" transform="rotate(-90, 26, 190)">IDENTITY</text>
  <text x="26" y="420" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="600" transform="rotate(-90, 26, 420)">ENTITY SNAPSHOTS</text>
</svg>
