<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1F4E79;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#183D5E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A7F62;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E6B50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="slateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3D4F5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C47F17;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A66914;stop-opacity:1" />
    </linearGradient>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2C3E50" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#90A4AE"/>
    </marker>
  </defs>

  <rect width="820" height="620" fill="#f9fafb"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" fill="#2C3E50" font-size="14" font-weight="700" letter-spacing="1.5">TIME-AWARE SNAPSHOT HIERARCHY</text>
  <text x="410" y="46" text-anchor="middle" fill="#546E7A" font-size="10">Layered materializations from daily capture through accumulating aggregations</text>

  <!-- ═══════════ Column headers ═══════════ -->
  <text x="278" y="72" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700" letter-spacing="1">ACCOUNT TRACK</text>
  <text x="618" y="72" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700" letter-spacing="1">CUSTOMER TRACK</text>

  <!-- Center divider -->
  <line x1="448" y1="62" x2="448" y2="480" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ═══════════ TIER 1: Daily Snapshots ═══════════ -->
  <text x="40" y="106" fill="#1F4E79" font-size="9" font-weight="600" letter-spacing="1">DAILY</text>

  <!-- Account daily -->
  <rect x="120" y="88" width="316" height="42" rx="8" fill="url(#navyGrad)" filter="url(#ds)"/>
  <text x="278" y="106" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="600">Daily Account Performance</text>
  <text x="278" y="120" text-anchor="middle" fill="#fff" font-size="9" opacity="0.7">Attributes Snapshot</text>

  <!-- Customer daily -->
  <rect x="460" y="88" width="316" height="42" rx="8" fill="url(#navyGrad)" filter="url(#ds)"/>
  <text x="618" y="106" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="600">Daily Customer</text>
  <text x="618" y="120" text-anchor="middle" fill="#fff" font-size="9" opacity="0.7">Attributes Snapshot</text>

  <!-- Tier separator -->
  <line x1="50" y1="148" x2="770" y2="148" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ═══════════ TIER 2: Historic Snapshots ═══════════ -->
  <text x="40" y="182" fill="#2A7F62" font-size="9" font-weight="600" letter-spacing="1">HISTORIC</text>

  <!-- Arrows: Daily Account → Weekly + Monthly -->
  <line x1="210" y1="130" x2="210" y2="196" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="346" y1="130" x2="346" y2="196" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Arrow: Daily Customer → Monthly Customer -->
  <line x1="618" y1="130" x2="618" y2="196" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Weekly Account -->
  <rect x="120" y="202" width="180" height="42" rx="8" fill="url(#tealGrad)" filter="url(#ds)"/>
  <text x="210" y="220" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">Weekly Account</text>
  <text x="210" y="234" text-anchor="middle" fill="#fff" font-size="9" opacity="0.7">Performance Snapshot</text>

  <!-- Monthly Account -->
  <rect x="320" y="202" width="116" height="42" rx="8" fill="url(#tealGrad)" filter="url(#ds)"/>
  <text x="378" y="220" text-anchor="middle" fill="#fff" font-size="10.5" font-weight="500">Monthly</text>
  <text x="378" y="234" text-anchor="middle" fill="#fff" font-size="9" opacity="0.7">Account Snap.</text>

  <!-- Cycle Account (additional from the loan architecture) -->
  <!-- Monthly Customer -->
  <rect x="460" y="202" width="316" height="42" rx="8" fill="url(#tealGrad)" filter="url(#ds)"/>
  <text x="618" y="220" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">Monthly Customer</text>
  <text x="618" y="234" text-anchor="middle" fill="#fff" font-size="9" opacity="0.7">Attributes Snapshot</text>

  <!-- Tier separator -->
  <line x1="50" y1="264" x2="770" y2="264" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ═══════════ TIER 3: Accumulating / Current Snapshots ═══════════ -->
  <text x="40" y="296" fill="#C47F17" font-size="9" font-weight="600" letter-spacing="1">ACCUM.</text>

  <!-- Arrows from Weekly + Monthly → Accumulating boxes -->
  <!-- From Weekly Account down -->
  <line x1="160" y1="244" x2="160" y2="310" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <!-- From Monthly Account down -->
  <line x1="278" y1="244" x2="278" y2="310" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="378" y1="244" x2="378" y2="310" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- WTD -->
  <rect x="88" y="316" width="142" height="50" rx="8" fill="url(#amberGrad)" filter="url(#ds)"/>
  <text x="159" y="338" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="600">WTD</text>
  <text x="159" y="354" text-anchor="middle" fill="#fff" font-size="9" opacity="0.8">Week-to-Date</text>

  <!-- MTD -->
  <rect x="244" y="316" width="142" height="50" rx="8" fill="url(#amberGrad)" filter="url(#ds)"/>
  <text x="315" y="338" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="600">MTD</text>
  <text x="315" y="354" text-anchor="middle" fill="#fff" font-size="9" opacity="0.8">Month-to-Date</text>

  <!-- YTD -->
  <rect x="460" y="316" width="142" height="50" rx="8" fill="url(#amberGrad)" filter="url(#ds)"/>
  <text x="531" y="338" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="600">YTD</text>
  <text x="531" y="354" text-anchor="middle" fill="#fff" font-size="9" opacity="0.8">Year-to-Date</text>

  <!-- Lifetime -->
  <rect x="616" y="316" width="160" height="50" rx="8" fill="url(#amberGrad)" filter="url(#ds)"/>
  <text x="696" y="338" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="600">Lifetime</text>
  <text x="696" y="354" text-anchor="middle" fill="#fff" font-size="9" opacity="0.8">All-time Accumulating</text>

  <!-- Arrows from Monthly/Customer down to YTD + Lifetime -->
  <line x1="540" y1="244" x2="531" y2="310" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="696" y1="244" x2="696" y2="310" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ═══════════ TIER 4: Legend / Time grains ═══════════ -->
  <line x1="50" y1="392" x2="770" y2="392" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="56" y="422" fill="#1F4E79" font-size="10" font-weight="600" letter-spacing="1">TIME GRAINS AT A GLANCE</text>

  <!-- Legend rows -->
  <rect x="56" y="438" width="14" height="14" rx="3" fill="#1F4E79"/>
  <text x="80" y="450" fill="#2C3E50" font-size="10.5"><tspan font-weight="600">Daily</tspan> — Full attribute refresh every day; the most granular foundation layer</text>

  <rect x="56" y="462" width="14" height="14" rx="3" fill="#2A7F62"/>
  <text x="80" y="474" fill="#2C3E50" font-size="10.5"><tspan font-weight="600">Weekly / Monthly</tspan> — Period-end snapshots preserving the official closing state</text>

  <rect x="56" y="486" width="14" height="14" rx="3" fill="#C47F17"/>
  <text x="80" y="498" fill="#2C3E50" font-size="10.5"><tspan font-weight="600">Accumulating</tspan> — Running aggregations (WTD, MTD, YTD, Lifetime) for trend analysis</text>

  <!-- Additional notes -->
  <line x1="50" y1="520" x2="770" y2="520" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="56" y="548" fill="#1F4E79" font-size="10" font-weight="600" letter-spacing="1">DESIGN NOTES</text>
  <text x="56" y="570" fill="#546E7A" font-size="10.5">Every snapshot carries a time-dimension key, enabling point-in-time joins for training sets and audit.</text>
  <text x="56" y="590" fill="#546E7A" font-size="10.5">The Account track captures product-level granularity; the Customer track aggregates across products.</text>
  <text x="56" y="610" fill="#546E7A" font-size="10.5">Accumulating snapshots feed models that need cumulative behavior signals (churn, LTV, credit risk).</text>

  <!-- Side labels -->
  <text x="22" y="112" text-anchor="middle" fill="#1F4E79" font-size="8" font-weight="600" transform="rotate(-90, 22, 112)">DAILY</text>
  <text x="22" y="224" text-anchor="middle" fill="#2A7F62" font-size="8" font-weight="600" transform="rotate(-90, 22, 224)">HISTORIC</text>
  <text x="22" y="346" text-anchor="middle" fill="#C47F17" font-size="8" font-weight="600" transform="rotate(-90, 22, 346)">ACCUM.</text>
</svg>
