<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F4E79" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1F4E79" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D35400" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D35400" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="#f9fafb" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1F4E79">Prepayment Hazard Rate by Month After Origination</text>
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888">Probability of full payoff in any given month, conditional on survival to that month</text>

  <!-- Chart area -->
  <!-- Y Axis -->
  <line x1="80" y1="70" x2="80" y2="350" stroke="#ddd" stroke-width="1"/>
  <!-- X Axis -->
  <line x1="80" y1="350" x2="750" y2="350" stroke="#ddd" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="72" y="350" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#888">0%</text>
  <text x="72" y="280" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#888">1%</text>
  <text x="72" y="210" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#888">2%</text>
  <text x="72" y="140" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#888">3%</text>
  <text x="72" y="70" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#888">4%</text>

  <!-- Y axis label -->
  <text x="20" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#2C3E50" transform="rotate(-90, 20, 210)">Hazard Rate</text>

  <!-- Grid lines -->
  <line x1="80" y1="280" x2="750" y2="280" stroke="#eee" stroke-width="1"/>
  <line x1="80" y1="210" x2="750" y2="210" stroke="#eee" stroke-width="1"/>
  <line x1="80" y1="140" x2="750" y2="140" stroke="#eee" stroke-width="1"/>
  <line x1="80" y1="70" x2="750" y2="70" stroke="#eee" stroke-width="1"/>

  <!-- X axis labels (months) -->
  <text x="107" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">1</text>
  <text x="161" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">3</text>
  <text x="215" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">5</text>
  <text x="269" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">7</text>
  <text x="323" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">9</text>
  <text x="377" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">11</text>
  <text x="431" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">13</text>
  <text x="485" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">15</text>
  <text x="539" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">17</text>
  <text x="593" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">19</text>
  <text x="647" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">21</text>
  <text x="701" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#888">23</text>

  <!-- X axis label -->
  <text x="415" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#2C3E50">Months After Origination</text>

  <!-- Performance window annotation -->
  <rect x="80" y="60" width="323" height="290" fill="none" stroke="#2A7F62" stroke-width="1.5" stroke-dasharray="5,3" rx="4"/>
  <rect x="160" y="52" width="165" height="18" rx="3" fill="#f9fafb"/>
  <text x="243" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#2A7F62">12-Month Performance Window</text>

  <!-- Area fill under curve (first 12 months) -->
  <path d="M80,350 L107,347 L134,343 L161,336 L188,328 L215,318 L242,313 L269,305 L296,296 L323,290 L350,284 L377,277 L403,350 Z" fill="url(#areaGrad)"/>

  <!-- Area fill (after 12 months - danger zone) -->
  <path d="M403,350 L403,277 L431,270 L458,264 L485,256 L512,250 L539,242 L566,237 L593,228 L620,220 L647,208 L674,188 L701,170 L728,145 L750,120 L750,350 Z" fill="url(#dangerGrad)"/>

  <!-- The curve itself -->
  <polyline
    points="80,350 107,347 134,343 161,336 188,328 215,318 242,313 269,305 296,296 323,290 350,284 377,277 403,270 431,264 458,256 485,250 512,242 539,237 566,228 593,220 620,208 647,188 674,170 701,145 728,120"
    fill="none" stroke="#1F4E79" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="107" cy="347" r="3" fill="#1F4E79"/>
  <circle cx="161" cy="336" r="3" fill="#1F4E79"/>
  <circle cx="215" cy="318" r="3" fill="#1F4E79"/>
  <circle cx="269" cy="305" r="3" fill="#1F4E79"/>
  <circle cx="323" cy="290" r="3" fill="#1F4E79"/>
  <circle cx="377" cy="277" r="3" fill="#1F4E79"/>
  <circle cx="431" cy="264" r="3" fill="#1F4E79"/>
  <circle cx="485" cy="250" r="3" fill="#1F4E79"/>
  <circle cx="539" cy="237" r="3" fill="#1F4E79"/>
  <circle cx="593" cy="220" r="3" fill="#D35400"/>
  <circle cx="647" cy="188" r="3" fill="#D35400"/>
  <circle cx="701" cy="145" r="3" fill="#D35400"/>
  <circle cx="728" cy="120" r="3" fill="#D35400"/>

  <!-- Annotation: thin data warning -->
  <text x="715" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#D35400" font-style="italic">Thin data —</text>
  <text x="715" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#D35400" font-style="italic">less reliable</text>

  <!-- Key insight callout -->
  <rect x="460" y="300" width="260" height="44" rx="5" fill="#fff" stroke="#1F4E79" stroke-width="1"/>
  <text x="590" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1F4E79">Key Insight</text>
  <text x="590" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2C3E50">Risk accelerates after month 10-12</text>

  <!-- Footer note -->
  <text x="400" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#aaa">Stylized representation — actual rates vary by portfolio vintage and market conditions</text>
</svg>
