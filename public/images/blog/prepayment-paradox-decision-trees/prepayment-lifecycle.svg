<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1F4E79"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2A7F62"/>
    </marker>
    <filter id="shadow1" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="#f9fafb" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1F4E79">The Prepayment Lifecycle</text>

  <!-- Main flow boxes -->
  <!-- Box 1: Solicitation -->
  <rect x="30" y="70" width="130" height="64" rx="6" fill="#1F4E79" filter="url(#shadow1)"/>
  <text x="95" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Marketing</text>
  <text x="95" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Solicitation</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="102" x2="192" y2="102" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 2: Origination -->
  <rect x="195" y="70" width="130" height="64" rx="6" fill="#1F4E79" filter="url(#shadow1)"/>
  <text x="260" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Loan</text>
  <text x="260" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Origination</text>

  <!-- Arrow 2→3 -->
  <line x1="325" y1="102" x2="357" y2="102" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 3: Seasoning -->
  <rect x="360" y="70" width="130" height="64" rx="6" fill="#2C3E50" filter="url(#shadow1)"/>
  <text x="425" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Loan Seasoning</text>
  <text x="425" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">(6-18 months)</text>

  <!-- Arrow 3→4 -->
  <line x1="490" y1="102" x2="522" y2="102" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 4: Trigger Event -->
  <rect x="525" y="70" width="130" height="64" rx="6" fill="#D35400" filter="url(#shadow1)"/>
  <text x="590" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Prepayment</text>
  <text x="590" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Trigger</text>

  <!-- Arrow 4→5 -->
  <line x1="655" y1="102" x2="687" y2="102" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Box 5: Payoff -->
  <rect x="690" y="70" width="130" height="64" rx="6" fill="#922B21" filter="url(#shadow1)"/>
  <text x="755" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Early Payoff</text>
  <text x="755" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">(Revenue Loss)</text>

  <!-- Trigger event sub-labels -->
  <text x="590" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#D35400" font-style="italic">Rate drop · Home sale · Refi offer</text>

  <!-- Intervention Zone 1: Pre-Acquisition Suppression -->
  <rect x="30" y="195" width="290" height="120" rx="6" fill="none" stroke="#2A7F62" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="42" y="187" width="196" height="18" rx="3" fill="#f9fafb"/>
  <text x="140" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2A7F62">INTERVENTION ZONE 1</text>

  <text x="175" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#2C3E50">Pre-Acquisition Suppression</text>
  <text x="175" y="246" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">Use predictive model to identify</text>
  <text x="175" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">high-prepayment-risk prospects and</text>
  <text x="175" y="274" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">suppress from solicitation campaigns</text>

  <!-- Dashed arrow from intervention 1 up to Solicitation -->
  <line x1="95" y1="195" x2="95" y2="137" stroke="#2A7F62" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-teal)"/>

  <!-- Intervention Zone 2: Retention Offers -->
  <rect x="525" y="195" width="295" height="120" rx="6" fill="none" stroke="#2A7F62" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="537" y="187" width="196" height="18" rx="3" fill="#f9fafb"/>
  <text x="635" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#2A7F62">INTERVENTION ZONE 2</text>

  <text x="672" y="226" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#2C3E50">Retention Response</text>
  <text x="672" y="246" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">Detect payoff-quote requests and</text>
  <text x="672" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#555">trigger proactive retention offers:</text>
  <text x="672" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2A7F62" font-weight="600">Rate modification · Refi into new product</text>
  <text x="672" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2A7F62" font-weight="600">Loyalty incentives</text>

  <!-- Dashed arrow from intervention 2 up to Trigger -->
  <line x1="590" y1="195" x2="590" y2="137" stroke="#2A7F62" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-teal)"/>

  <!-- Time axis -->
  <line x1="50" y1="330" x2="850" y2="330" stroke="#ccc" stroke-width="1"/>
  <text x="450" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#999">TIME →</text>
</svg>
