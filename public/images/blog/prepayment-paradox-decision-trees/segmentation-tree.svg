<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520">
  <defs>
    <filter id="ds" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="860" height="520" fill="#f9fafb" rx="8"/>

  <!-- Title -->
  <text x="430" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1F4E79">Segmentation Tree: Identifying High-Prepayment-Risk Nodes</text>
  <text x="430" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#888">Each split maximizes separation between prepay and non-prepay populations</text>

  <!-- Root Node -->
  <rect x="330" y="60" width="200" height="50" rx="6" fill="#1F4E79" filter="url(#ds)"/>
  <text x="430" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">Full Population</text>
  <text x="430" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#B0C4DE">Base prepay rate: ~11%</text>

  <!-- Split 1 label -->
  <text x="430" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#2A7F62">Split on: Avg. Mortgage Trade Age</text>

  <!-- Lines from root to level 1 -->
  <line x1="370" y1="110" x2="210" y2="170" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="490" y1="110" x2="650" y2="170" stroke="#1F4E79" stroke-width="1.5"/>

  <!-- Split labels on lines -->
  <text x="270" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Younger trades</text>
  <text x="270" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">(newer mortgages)</text>
  <text x="590" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Older trades</text>
  <text x="590" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">(established mortgages)</text>

  <!-- Level 1 Left: Younger trades -->
  <rect x="110" y="170" width="200" height="50" rx="6" fill="#D35400" filter="url(#ds)"/>
  <text x="210" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Younger Mortgages</text>
  <text x="210" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FDEBD0">Prepay rate: ~19%</text>

  <!-- Level 1 Right: Older trades -->
  <rect x="550" y="170" width="200" height="50" rx="6" fill="#2C3E50" filter="url(#ds)"/>
  <text x="650" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fff">Established Mortgages</text>
  <text x="650" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#B0C4DE">Prepay rate: ~10%</text>

  <!-- Split 2 label (left branch) -->
  <text x="210" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#2A7F62">Split on: Card Payment-to-Balance Ratio</text>

  <!-- Lines from Level 1 Left to Level 2 -->
  <line x1="160" y1="220" x2="90" y2="280" stroke="#D35400" stroke-width="1.5"/>
  <line x1="260" y1="220" x2="330" y2="280" stroke="#D35400" stroke-width="1.5"/>

  <!-- Split labels -->
  <text x="108" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Low ratio</text>
  <text x="108" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">(paying down fast)</text>
  <text x="310" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Higher ratio</text>
  <text x="310" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">(revolving more)</text>

  <!-- Level 2 Left-Left: Low payment ratio + young mortgage -->
  <rect x="15" y="280" width="160" height="50" rx="6" fill="#D35400" filter="url(#ds)"/>
  <text x="95" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Low Card Balance</text>
  <text x="95" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FDEBD0">Prepay rate: ~22%</text>

  <!-- Level 2 Left-Right -->
  <rect x="250" y="280" width="160" height="50" rx="6" fill="#2C3E50" filter="url(#ds)"/>
  <text x="330" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Higher Utilization</text>
  <text x="330" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#B0C4DE">Prepay rate: ~11%</text>

  <!-- Split 2 label (right branch) -->
  <text x="650" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#2A7F62">Split on: Total Balance of All Trades</text>

  <!-- Lines from Level 1 Right to Level 2 -->
  <line x1="600" y1="220" x2="530" y2="280" stroke="#2C3E50" stroke-width="1.5"/>
  <line x1="700" y1="220" x2="770" y2="280" stroke="#2C3E50" stroke-width="1.5"/>

  <text x="548" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Lower balances</text>
  <text x="750" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Higher balances</text>

  <!-- Level 2 Right-Left -->
  <rect x="455" y="280" width="160" height="50" rx="6" fill="#2C3E50" filter="url(#ds)"/>
  <text x="535" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Lower Debt Load</text>
  <text x="535" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#B0C4DE">Prepay rate: ~8%</text>

  <!-- Level 2 Right-Right -->
  <rect x="690" y="280" width="160" height="50" rx="6" fill="#2C3E50" filter="url(#ds)"/>
  <text x="770" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Higher Debt Load</text>
  <text x="770" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#B0C4DE">Prepay rate: ~12%</text>

  <!-- Level 3: Final split on the hottest node -->
  <text x="95" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#2A7F62">Split on: % Trades w/ High Utilization</text>

  <line x1="55" y1="330" x2="30" y2="380" stroke="#D35400" stroke-width="1.5"/>
  <line x1="135" y1="330" x2="170" y2="380" stroke="#D35400" stroke-width="1.5"/>

  <!-- Terminal Node: HIGHEST RISK -->
  <rect x="0" y="385" width="100" height="60" rx="6" fill="#922B21" filter="url(#ds)" stroke="#D35400" stroke-width="2"/>
  <text x="50" y="404" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff">NODE 2</text>
  <text x="50" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FDEBD0">Prepay: ~31%</text>
  <text x="50" y="436" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FDEBD0">~5% of pop.</text>

  <!-- Terminal Node: Medium -->
  <rect x="120" y="385" width="100" height="60" rx="6" fill="#D35400" filter="url(#ds)"/>
  <text x="170" y="404" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff">NODE 3</text>
  <text x="170" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FDEBD0">Prepay: ~15%</text>
  <text x="170" y="436" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FDEBD0">~6% of pop.</text>

  <!-- Highest risk callout -->
  <rect x="0" y="455" width="220" height="38" rx="5" fill="#FFF5F0" stroke="#922B21" stroke-width="1"/>
  <text x="110" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#922B21">⬆ Highest Risk: 2.8× base rate</text>
  <text x="110" y="486" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#666">Young mortgage + low card debt + few high-util trades</text>

  <!-- Legend -->
  <rect x="530" y="400" width="300" height="100" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="680" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1F4E79">Risk Profile Interpretation</text>
  <circle cx="555" cy="440" r="5" fill="#922B21"/>
  <text x="570" y="444" font-family="system-ui, sans-serif" font-size="10" fill="#2C3E50">Very high risk — suppress from acquisition</text>
  <circle cx="555" cy="460" r="5" fill="#D35400"/>
  <text x="570" y="464" font-family="system-ui, sans-serif" font-size="10" fill="#2C3E50">Elevated risk — monitor closely</text>
  <circle cx="555" cy="480" r="5" fill="#2C3E50"/>
  <text x="570" y="484" font-family="system-ui, sans-serif" font-size="10" fill="#2C3E50">Low risk — proceed with solicitation</text>
</svg>
