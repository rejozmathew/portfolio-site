<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="'Segoe UI', -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgG4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fafb"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
    <filter id="sh4" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1F4E79" flood-opacity="0.15"/>
    </filter>
    <filter id="shTeal" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#e67e22" flood-opacity="0.15"/>
    </filter>
    <marker id="det" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#1F4E79"/>
    </marker>
    <marker id="prob" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#1F4E79" stroke-width="1"/>
    </marker>
    <marker id="event" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#e67e22"/>
    </marker>
    <marker id="trans" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#8B5E3C"/>
    </marker>
  </defs>

  <rect width="960" height="560" fill="url(#bgG4)" rx="8"/>
  <text x="360" y="30" text-anchor="middle" fill="#1F4E79" font-size="15" font-weight="700">Conceptual Identity Graph Model</text>

  <!-- ===== CUSTOMER NODE (center) ===== -->
  <circle cx="370" cy="280" r="50" fill="#fff" stroke="#1F4E79" stroke-width="3.5" filter="url(#sh4)"/>
  <circle cx="370" cy="280" r="40" fill="#1F4E79" fill-opacity="0.06"/>
  <circle cx="370" cy="268" r="11" fill="#1F4E79" fill-opacity="0.65"/>
  <path d="M347,295 Q347,282 370,282 Q393,282 393,295" fill="#1F4E79" fill-opacity="0.65"/>
  <text x="370" y="318" text-anchor="middle" fill="#1F4E79" font-size="12" font-weight="700">Customer</text>

  <!-- ===== IDENTITY NODES (left side, vertically spaced) ===== -->

  <!-- Email ID — top-left -->
  <circle cx="120" cy="155" r="34" fill="#fff" stroke="#2A7F62" stroke-width="2.5" filter="url(#shTeal)"/>
  <text x="120" y="158" text-anchor="middle" fill="#2A7F62" font-size="10.5" font-weight="600">Email ID</text>
  <text x="120" y="172" text-anchor="middle" fill="#8899aa" font-size="8">j***@mail.com</text>
  <line x1="148" y1="176" x2="328" y2="252" stroke="#2A7F62" stroke-width="1.8" marker-end="url(#det)"/>
  <!-- Label badge -->
  <rect x="178" y="198" width="88" height="16" rx="8" fill="#fff" stroke="#2A7F62" stroke-width="0.8"/>
  <text x="222" y="209" text-anchor="middle" fill="#2A7F62" font-size="7" font-weight="600">EMAILED AT</text>

  <!-- Phone — mid-left -->
  <circle cx="80" cy="260" r="34" fill="#fff" stroke="#2A7F62" stroke-width="2.5" filter="url(#shTeal)"/>
  <text x="80" y="258" text-anchor="middle" fill="#2A7F62" font-size="10.5" font-weight="600">Phone</text>
  <text x="80" y="272" text-anchor="middle" fill="#8899aa" font-size="8">***-4821</text>
  <line x1="114" y1="262" x2="320" y2="276" stroke="#2A7F62" stroke-width="1.8" marker-end="url(#det)"/>
  <rect x="173" y="258" width="86" height="16" rx="8" fill="#fff" stroke="#2A7F62" stroke-width="0.8"/>
  <text x="216" y="269" text-anchor="middle" fill="#2A7F62" font-size="7" font-weight="600">HAS PHONE</text>

  <!-- Address — lower-left -->
  <circle cx="95" cy="420" r="34" fill="#fff" stroke="#2A7F62" stroke-width="2.5" filter="url(#shTeal)"/>
  <text x="95" y="418" text-anchor="middle" fill="#2A7F62" font-size="10.5" font-weight="600">Address</text>
  <text x="95" y="432" text-anchor="middle" fill="#8899aa" font-size="8">123 Oak St</text>
  <line x1="126" y1="402" x2="330" y2="306" stroke="#2A7F62" stroke-width="1.8" marker-end="url(#det)"/>
  <rect x="185" y="349" width="72" height="16" rx="8" fill="#fff" stroke="#2A7F62" stroke-width="0.8"/>
  <text x="221" y="360" text-anchor="middle" fill="#2A7F62" font-size="7" font-weight="600">LIVES AT</text>

  <!-- Device — upper-left-center -->
  <circle cx="200" cy="75" r="34" fill="#fff" stroke="#2A7F62" stroke-width="2.5" filter="url(#shTeal)"/>
  <text x="200" y="73" text-anchor="middle" fill="#2A7F62" font-size="10.5" font-weight="600">Device</text>
  <text x="200" y="87" text-anchor="middle" fill="#8899aa" font-size="8">d7x2</text>
  <line x1="224" y1="102" x2="340" y2="240" stroke="#2A7F62" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#prob)"/>
  <rect x="247" y="149" width="88" height="16" rx="8" fill="#fff" stroke="#2A7F62" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="291" y="160" text-anchor="middle" fill="#2A7F62" font-size="7" font-weight="600">USES DEVICE</text>

  <!-- Full Name (PII) — bottom-left -->
  <circle cx="180" cy="510" r="34" fill="#fff" stroke="#c0392b" stroke-width="2.5" filter="url(#sh4)"/>
  <text x="180" y="508" text-anchor="middle" fill="#c0392b" font-size="10.5" font-weight="600">Full Name</text>
  <text x="180" y="522" text-anchor="middle" fill="#c0392b" font-size="7" font-style="italic">PII — isolated</text>
  <line x1="208" y1="490" x2="340" y2="316" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#prob)"/>
  <rect x="238" y="406" width="86" height="16" rx="8" fill="#fff" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="281" y="417" text-anchor="middle" fill="#c0392b" font-size="7" font-weight="600">NAMED AS</text>

  <!-- SSN (PII) — bottom-center-left -->
  <circle cx="300" cy="520" r="34" fill="#fff" stroke="#c0392b" stroke-width="2.5" filter="url(#sh4)"/>
  <text x="300" y="518" text-anchor="middle" fill="#c0392b" font-size="10.5" font-weight="600">SSN</text>
  <text x="300" y="532" text-anchor="middle" fill="#c0392b" font-size="7" font-style="italic">encrypted</text>
  <line x1="312" y1="486" x2="358" y2="332" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#prob)"/>
  <rect x="306" y="385" width="78" height="16" rx="8" fill="#fff" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="345" y="396" text-anchor="middle" fill="#c0392b" font-size="7" font-weight="600">IDENTIFIED BY</text>

  <!-- ===== EVENT NODES (upper-right) ===== -->

  <!-- Web Event -->
  <circle cx="560" cy="90" r="34" fill="#fff" stroke="#e67e22" stroke-width="2.5" filter="url(#sh4)"/>
  <text x="560" y="87" text-anchor="middle" fill="#e67e22" font-size="10.5" font-weight="600">Web Event</text>
  <text x="560" y="101" text-anchor="middle" fill="#8899aa" font-size="8">pages, clicks</text>
  <line x1="533" y1="116" x2="405" y2="245" stroke="#e67e22" stroke-width="1.8" marker-end="url(#event)"/>
  <rect x="430" y="162" width="86" height="16" rx="8" fill="#fff" stroke="#e67e22" stroke-width="0.8"/>
  <text x="473" y="173" text-anchor="middle" fill="#e67e22" font-size="7" font-weight="600">BROWSED</text>

  <!-- Email Event -->
  <circle cx="620" cy="210" r="34" fill="#fff" stroke="#e67e22" stroke-width="2.5" filter="url(#sh4)"/>
  <text x="620" y="207" text-anchor="middle" fill="#e67e22" font-size="10.5" font-weight="600">Email Event</text>
  <text x="620" y="221" text-anchor="middle" fill="#8899aa" font-size="8">opens, clicks</text>
  <line x1="587" y1="219" x2="420" y2="268" stroke="#e67e22" stroke-width="1.8" marker-end="url(#event)"/>
  <rect x="468" y="232" width="94" height="16" rx="8" fill="#fff" stroke="#e67e22" stroke-width="0.8"/>
  <text x="515" y="243" text-anchor="middle" fill="#e67e22" font-size="7" font-weight="600">SENT / OPENED</text>

  <!-- Call Event -->
  <circle cx="620" cy="340" r="34" fill="#fff" stroke="#e67e22" stroke-width="2.5" filter="url(#sh4)"/>
  <text x="620" y="337" text-anchor="middle" fill="#e67e22" font-size="10.5" font-weight="600">Call Event</text>
  <text x="620" y="351" text-anchor="middle" fill="#8899aa" font-size="8">inbound, outbound</text>
  <line x1="587" y1="332" x2="420" y2="292" stroke="#e67e22" stroke-width="1.8" marker-end="url(#event)"/>
  <rect x="468" y="300" width="94" height="16" rx="8" fill="#fff" stroke="#e67e22" stroke-width="0.8"/>
  <text x="515" y="311" text-anchor="middle" fill="#e67e22" font-size="7" font-weight="600">CALLED / RECEIVED</text>

  <!-- Transaction Event -->
  <circle cx="590" cy="460" r="34" fill="#fff" stroke="#e67e22" stroke-width="2.5" filter="url(#sh4)"/>
  <text x="590" y="452" text-anchor="middle" fill="#e67e22" font-size="10.5" font-weight="600">Transaction</text>
  <text x="590" y="466" text-anchor="middle" fill="#e67e22" font-size="10.5" font-weight="600">Event</text>
  <text x="590" y="480" text-anchor="middle" fill="#8899aa" font-size="8">transfers, payments</text>
  <line x1="558" y1="448" x2="405" y2="315" stroke="#e67e22" stroke-width="1.8" marker-end="url(#event)"/>
  <rect x="445" y="370" width="88" height="16" rx="8" fill="#fff" stroke="#e67e22" stroke-width="0.8"/>
  <text x="489" y="381" text-anchor="middle" fill="#e67e22" font-size="7" font-weight="600">TRANSACTED</text>

  <!-- ===== TRANSACTIONAL NODES (bottom-right) ===== -->

  <!-- Application -->
  <circle cx="530" cy="520" r="34" fill="#fff" stroke="#8B5E3C" stroke-width="2.5" filter="url(#sh4)"/>
  <text x="530" y="527" text-anchor="middle" fill="#8B5E3C" font-size="10.5" font-weight="600">Application</text>
  <text x="530" y="541" text-anchor="middle" fill="#8899aa" font-size="8">loan, card</text>
  <line x1="510" y1="490" x2="398" y2="320" stroke="#8B5E3C" stroke-width="1.8" marker-end="url(#trans)"/>
  <rect x="420" y="418" width="88" height="16" rx="8" fill="#fff" stroke="#8B5E3C" stroke-width="0.8"/>
  <text x="465" y="429" text-anchor="middle" fill="#8B5E3C" font-size="7" font-weight="600">SUBMITTED BY</text>

  <!-- Account -->
  <circle cx="425" cy="520" r="34" fill="#fff" stroke="#8B5E3C" stroke-width="2.5" filter="url(#sh4)"/>
  <text x="425" y="527" text-anchor="middle" fill="#8B5E3C" font-size="10.5" font-weight="600">Account</text>
  <text x="425" y="541" text-anchor="middle" fill="#8899aa" font-size="8">A-9031</text>
  <line x1="423" y1="488" x2="388" y2="325" stroke="#8B5E3C" stroke-width="1.8" marker-end="url(#trans)"/>
  <rect x="370" y="450" width="88" height="16" rx="8" fill="#fff" stroke="#8B5E3C" stroke-width="0.8"/>
  <text x="415" y="460" text-anchor="middle" fill="#8B5E3C" font-size="7" font-weight="600">HOLDS ACCT</text>

  <!-- ===== LEGEND ===== -->
  <rect x="730" y="50" width="215" height="220" rx="10" fill="#fff" stroke="#e0e5ec" stroke-width="1.2" filter="url(#sh4)"/>
  <text x="837" y="74" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="700">Edge Types</text>

  <line x1="745" y1="96" x2="785" y2="96" stroke="#1F4E79" stroke-width="2" marker-end="url(#det)"/>
  <text x="793" y="100" fill="#2C3E50" font-size="9">Deterministic linkage</text>

  <line x1="745" y1="120" x2="785" y2="120" stroke="#1F4E79" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#prob)"/>
  <text x="793" y="124" fill="#2C3E50" font-size="9">Probabilistic linkage</text>



  <text x="837" y="175" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="700">Node Types</text>

  <circle cx="755" cy="195" r="7" fill="none" stroke="#2A7F62" stroke-width="2"/>
  <text x="770" y="200" fill="#2C3E50" font-size="8.5">Identity (Email, Phone, Address, Device)</text>

  <circle cx="755" cy="218" r="7" fill="none" stroke="#e67e22" stroke-width="2"/>
  <text x="770" y="223" fill="#2C3E50" font-size="8.5">Event (Web, Email, Call, Transaction)</text>

  <circle cx="755" cy="240" r="7" fill="none" stroke="#8B5E3C" stroke-width="2"/>
  <text x="770" y="243" fill="#2C3E50" font-size="8.5">Transactional (Application, Account)</text>

  <!-- Compliance callout -->
  <rect x="730" y="290" width="215" height="90" rx="10" fill="#fff" stroke="#c0392b" stroke-width="1.2" filter="url(#sh4)"/>
  <text x="837" y="312" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">Privacy Architecture</text>
  <circle cx="755" cy="334" r="7" fill="none" stroke="#c0392b" stroke-width="2"/>
  <text x="770" y="338" fill="#2C3E50" font-size="8.5">PII nodes (Name, SSN) — isolated</text>
  <text x="770" y="352" fill="#2C3E50" font-size="8.5">for single-point deletion, consent</text>
  <text x="770" y="366" fill="#2C3E50" font-size="8.5">mgmt, and GDPR/CCPA compliance</text>
</svg>
