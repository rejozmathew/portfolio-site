<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="dsAV" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hgAV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <marker id="aAV" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#1F4E79"/>
    </marker>
    <marker id="aAVt" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2A7F62"/>
    </marker>
    <marker id="aAVr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#c0392b"/>
    </marker>
  </defs>

  <rect width="960" height="440" fill="#f9fafb" rx="12"/>
  <rect x="0" y="0" width="960" height="50" fill="url(#hgAV)" rx="12"/>
  <rect x="0" y="25" width="960" height="25" fill="url(#hgAV)"/>
  <text x="480" y="33" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">From Applicability Conditions to Auto-Generated Validation</text>

  <!-- Column labels -->
  <text x="100" y="78" text-anchor="middle" fill="#1F4E79" font-size="11" font-weight="700" letter-spacing="0.5">ANALYST DOCUMENTS</text>
  <text x="350" y="78" text-anchor="middle" fill="#2A7F62" font-size="11" font-weight="700" letter-spacing="0.5">SYSTEM GENERATES</text>
  <text x="610" y="78" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="700" letter-spacing="0.5">MESSAGE CODES PRODUCED</text>
  <text x="860" y="78" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="700" letter-spacing="0.5">CENTRALIZED LOG</text>

  <!-- Dashed dividers -->
  <line x1="215" y1="64" x2="215" y2="420" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="485" y1="64" x2="485" y2="420" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="760" y1="64" x2="760" y2="420" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- === COLUMN 1: 5 Applicability Types === -->
  <g filter="url(#dsAV)">
    <rect x="20" y="95" width="178" height="38" rx="5" fill="#ffffff" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="109" y="110" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">Always</text>
    <text x="109" y="124" text-anchor="middle" fill="#64748b" font-size="8">e.g., account_open_date</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="20" y="143" width="178" height="38" rx="5" fill="#ffffff" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="109" y="158" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">When</text>
    <text x="109" y="172" text-anchor="middle" fill="#64748b" font-size="8">e.g., paid_off_amount</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="20" y="191" width="178" height="38" rx="5" fill="#ffffff" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="109" y="206" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">Sometimes When</text>
    <text x="109" y="220" text-anchor="middle" fill="#64748b" font-size="8">e.g., school_address</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="20" y="239" width="178" height="38" rx="5" fill="#ffffff" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="109" y="254" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">Value Driven</text>
    <text x="109" y="268" text-anchor="middle" fill="#64748b" font-size="8">Sentinel values for N/A</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="20" y="287" width="178" height="38" rx="5" fill="#ffffff" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="109" y="302" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">Undefined</text>
    <text x="109" y="316" text-anchor="middle" fill="#64748b" font-size="8">No rule — limits validation</text>
  </g>

  <!-- Arrows from applicability to validation inputs -->
  <line x1="198" y1="162" x2="228" y2="135" stroke="#1F4E79" stroke-width="1" marker-end="url(#aAV)" opacity="0.4"/>
  <line x1="198" y1="210" x2="228" y2="185" stroke="#1F4E79" stroke-width="1" marker-end="url(#aAV)" opacity="0.4"/>
  <line x1="198" y1="258" x2="228" y2="235" stroke="#1F4E79" stroke-width="1" marker-end="url(#aAV)" opacity="0.4"/>
  <line x1="198" y1="114" x2="228" y2="135" stroke="#1F4E79" stroke-width="1" marker-end="url(#aAV)" opacity="0.4"/>
  <line x1="198" y1="306" x2="228" y2="285" stroke="#1F4E79" stroke-width="1" marker-end="url(#aAV)" opacity="0.4"/>

  <!-- === COLUMN 2: 4 Auto-Generated Validation Inputs === -->
  <g filter="url(#dsAV)">
    <rect x="232" y="105" width="190" height="42" rx="6" fill="#e6f5f0" stroke="#2A7F62" stroke-width="1.5"/>
    <text x="327" y="122" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">Structure Join Applicability</text>
    <text x="327" y="138" text-anchor="middle" fill="#64748b" font-size="8">RI checks per source table</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="232" y="157" width="190" height="42" rx="6" fill="#e6f5f0" stroke="#2A7F62" stroke-width="1.5"/>
    <text x="327" y="174" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">Attribute Applicability Rules</text>
    <text x="327" y="190" text-anchor="middle" fill="#64748b" font-size="8">Field-level validation per type</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="232" y="209" width="190" height="42" rx="6" fill="#e6f5f0" stroke="#2A7F62" stroke-width="1.5"/>
    <text x="327" y="226" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">Data Class / Element Template</text>
    <text x="327" y="242" text-anchor="middle" fill="#64748b" font-size="8">Format conformance checks</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="232" y="261" width="190" height="42" rx="6" fill="#e6f5f0" stroke="#2A7F62" stroke-width="1.5"/>
    <text x="327" y="278" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">Value Accuracy Rules</text>
    <text x="327" y="294" text-anchor="middle" fill="#64748b" font-size="8">Valid lists, ranges, lookups</text>
  </g>

  <!-- Arrows from validation inputs to message codes -->
  <line x1="422" y1="126" x2="497" y2="115" stroke="#2A7F62" stroke-width="1" marker-end="url(#aAVt)" opacity="0.4"/>
  <line x1="422" y1="178" x2="497" y2="160" stroke="#2A7F62" stroke-width="1" marker-end="url(#aAVt)" opacity="0.4"/>
  <line x1="422" y1="230" x2="497" y2="250" stroke="#2A7F62" stroke-width="1" marker-end="url(#aAVt)" opacity="0.4"/>
  <line x1="422" y1="282" x2="497" y2="300" stroke="#2A7F62" stroke-width="1" marker-end="url(#aAVt)" opacity="0.4"/>

  <!-- === COLUMN 3: Message Codes === -->
  <g filter="url(#dsAV)">
    <rect x="500" y="95" width="246" height="38" rx="5" fill="#fff5f5" stroke="#c0392b" stroke-width="1.2"/>
    <text x="512" y="113" text-anchor="start" fill="#c0392b" font-size="10" font-weight="700">MC=50</text>
    <text x="570" y="113" text-anchor="start" fill="#2C3E50" font-size="9">Unknown — unexpected absence</text>
    <text x="570" y="126" text-anchor="start" fill="#64748b" font-size="8">Possible data defect</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="500" y="143" width="246" height="38" rx="5" fill="#f0fdf4" stroke="#2A7F62" stroke-width="1.2"/>
    <text x="512" y="161" text-anchor="start" fill="#2A7F62" font-size="10" font-weight="700">MC=51</text>
    <text x="570" y="161" text-anchor="start" fill="#2C3E50" font-size="9">Not Applicable — expected</text>
    <text x="570" y="174" text-anchor="start" fill="#64748b" font-size="8">By design, no defect</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="500" y="191" width="246" height="38" rx="5" fill="#fef3c7" stroke="#d4a017" stroke-width="1.2"/>
    <text x="512" y="209" text-anchor="start" fill="#b8860b" font-size="10" font-weight="700">MC=52</text>
    <text x="570" y="209" text-anchor="start" fill="#2C3E50" font-size="9">Unexpected presence</text>
    <text x="570" y="222" text-anchor="start" fill="#64748b" font-size="8">Something changed upstream</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="500" y="239" width="246" height="38" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/>
    <text x="512" y="257" text-anchor="start" fill="#7c3aed" font-size="10" font-weight="700">MC=30</text>
    <text x="570" y="257" text-anchor="start" fill="#2C3E50" font-size="9">Format mismatch</text>
    <text x="570" y="270" text-anchor="start" fill="#64748b" font-size="8">Reformatted to standard</text>
  </g>
  <g filter="url(#dsAV)">
    <rect x="500" y="287" width="246" height="38" rx="5" fill="#e8f4f8" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="512" y="305" text-anchor="start" fill="#1F4E79" font-size="10" font-weight="700">MC=60+</text>
    <text x="570" y="305" text-anchor="start" fill="#2C3E50" font-size="9">RI join failure</text>
    <text x="570" y="318" text-anchor="start" fill="#64748b" font-size="8">Structural breakdown</text>
  </g>

  <!-- Arrows from message codes to centralized log -->
  <line x1="746" y1="114" x2="773" y2="200" stroke="#c0392b" stroke-width="1" marker-end="url(#aAVr)" opacity="0.3"/>
  <line x1="746" y1="162" x2="773" y2="200" stroke="#c0392b" stroke-width="1" marker-end="url(#aAVr)" opacity="0.3"/>
  <line x1="746" y1="210" x2="773" y2="210" stroke="#c0392b" stroke-width="1" marker-end="url(#aAVr)" opacity="0.3"/>
  <line x1="746" y1="258" x2="773" y2="220" stroke="#c0392b" stroke-width="1" marker-end="url(#aAVr)" opacity="0.3"/>
  <line x1="746" y1="306" x2="773" y2="220" stroke="#c0392b" stroke-width="1" marker-end="url(#aAVr)" opacity="0.3"/>

  <!-- === COLUMN 4: Centralized Log === -->
  <g filter="url(#dsAV)">
    <rect x="778" y="130" width="162" height="165" rx="8" fill="#1F4E79"/>
  </g>
  <text x="859" y="158" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">📋 Message Log</text>
  <text x="859" y="178" text-anchor="middle" fill="#d1e3f3" font-size="9">Process name</text>
  <text x="859" y="194" text-anchor="middle" fill="#d1e3f3" font-size="9">Date</text>
  <text x="859" y="210" text-anchor="middle" fill="#d1e3f3" font-size="9">Attribute name</text>
  <text x="859" y="226" text-anchor="middle" fill="#d1e3f3" font-size="9">Message code</text>
  <text x="859" y="242" text-anchor="middle" fill="#d1e3f3" font-size="9">Offending value</text>
  <text x="859" y="258" text-anchor="middle" fill="#d1e3f3" font-size="9">Corrective action</text>
  <text x="859" y="284" text-anchor="middle" fill="#ffffff" font-size="8.5" font-weight="600">↓ Feeds threshold checks</text>
  <text x="859" y="296" text-anchor="middle" fill="#ffffff" font-size="8.5" font-weight="600">↓ Feeds anomaly detection</text>

  <!-- Bottom insight bar -->
  <rect x="20" y="355" width="920" height="70" rx="8" fill="#1F4E79" opacity="0.06" stroke="#1F4E79" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="380" text-anchor="middle" fill="#1F4E79" font-size="11" font-weight="700">💡 The analyst documents metadata. The system generates everything downstream.</text>
  <text x="480" y="398" text-anchor="middle" fill="#64748b" font-size="10">Not just "good" or "bad" — the system distinguishes expected absence (MC=51), unexpected absence (MC=50),</text>
  <text x="480" y="412" text-anchor="middle" fill="#64748b" font-size="10">and unexpected presence (MC=52). That granularity is what makes anomaly detection meaningful.</text>
</svg>
