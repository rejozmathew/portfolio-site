<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- Standard right-pointing arrow; auto-rotates with line direction -->
    <marker id="arrow-flow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2C3E50"/>
    </marker>
    <marker id="arrow-rest-start" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#2A7F62"/>
    </marker>
    <marker id="arrow-rest-end" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A7F62"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f9fafb"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#2C3E50">The Open Lakehouse Stack</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#64748b">Four layers, each independently evolvable, tied together by open standards</text>

  <!-- Compute Engines Layer -->
  <text x="80" y="100" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">COMPUTE ENGINES</text>
  <rect x="80" y="110" width="740" height="95" rx="10" fill="#ffffff" stroke="#1F4E79" stroke-width="2"/>

  <rect x="100" y="130" width="130" height="60" rx="6" fill="#1F4E79"/>
  <text x="165" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Snowflake</text>
  <text x="165" y="176" text-anchor="middle" font-size="10" fill="#cbd5e1">SQL, BI, Cortex AI</text>

  <rect x="246" y="130" width="130" height="60" rx="6" fill="#1F4E79"/>
  <text x="311" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Databricks</text>
  <text x="311" y="176" text-anchor="middle" font-size="10" fill="#cbd5e1">Spark, Mosaic AI</text>

  <rect x="392" y="130" width="110" height="60" rx="6" fill="#64748b"/>
  <text x="447" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Trino</text>
  <text x="447" y="176" text-anchor="middle" font-size="10" fill="#cbd5e1">Federation</text>

  <rect x="518" y="130" width="130" height="60" rx="6" fill="#64748b"/>
  <text x="583" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Apache Flink</text>
  <text x="583" y="176" text-anchor="middle" font-size="10" fill="#cbd5e1">Streaming</text>

  <rect x="664" y="130" width="130" height="60" rx="6" fill="#64748b"/>
  <text x="729" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">DuckDB / …</text>
  <text x="729" y="176" text-anchor="middle" font-size="10" fill="#cbd5e1">Embedded</text>

  <!-- Arrow down between layers 1 and 2 -->
  <line x1="450" y1="210" x2="450" y2="248" stroke="#2C3E50" stroke-width="1.8" marker-end="url(#arrow-flow)"/>
  <text x="465" y="234" font-size="10" fill="#64748b" font-style="italic">reads / writes</text>

  <!-- Catalog Layer -->
  <text x="80" y="268" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">CATALOG LAYER — governance, access control, lineage</text>
  <rect x="80" y="278" width="740" height="90" rx="10" fill="#ffffff" stroke="#1F4E79" stroke-width="2"/>

  <rect x="105" y="298" width="200" height="55" rx="6" fill="#ffffff" stroke="#2A7F62" stroke-width="1.5"/>
  <text x="205" y="321" text-anchor="middle" font-size="13" font-weight="700" fill="#2A7F62">Unity Catalog</text>
  <text x="205" y="340" text-anchor="middle" font-size="10" fill="#64748b">Databricks-native, Iceberg REST</text>

  <rect x="350" y="298" width="200" height="55" rx="6" fill="#ffffff" stroke="#2A7F62" stroke-width="1.5"/>
  <text x="450" y="321" text-anchor="middle" font-size="13" font-weight="700" fill="#2A7F62">Horizon / Polaris</text>
  <text x="450" y="340" text-anchor="middle" font-size="10" fill="#64748b">Snowflake-native, Iceberg REST</text>

  <rect x="595" y="298" width="200" height="55" rx="6" fill="#ffffff" stroke="#2A7F62" stroke-width="1.5"/>
  <text x="695" y="321" text-anchor="middle" font-size="13" font-weight="700" fill="#2A7F62">AWS Glue / HMS</text>
  <text x="695" y="340" text-anchor="middle" font-size="10" fill="#64748b">Legacy / open catalogs</text>

  <!-- Bidirectional federation arrows between catalogs -->
  <line x1="308" y1="325" x2="347" y2="325" stroke="#2A7F62" stroke-width="1.8" marker-start="url(#arrow-rest-start)" marker-end="url(#arrow-rest-end)"/>
  <line x1="553" y1="325" x2="592" y2="325" stroke="#2A7F62" stroke-width="1.8" marker-start="url(#arrow-rest-start)" marker-end="url(#arrow-rest-end)"/>

  <!-- Iceberg REST API annotation -->
  <text x="450" y="388" text-anchor="middle" font-size="11" font-style="italic" fill="#2A7F62">Catalogs federate to each other via the Iceberg REST Catalog API — no data copies</text>

  <!-- Arrow down from catalog to format -->
  <line x1="450" y1="398" x2="450" y2="430" stroke="#2C3E50" stroke-width="1.8" marker-end="url(#arrow-flow)"/>

  <!-- Iceberg Format Layer -->
  <text x="80" y="450" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">OPEN TABLE FORMAT</text>
  <rect x="80" y="460" width="740" height="65" rx="10" fill="#1F4E79"/>
  <text x="450" y="487" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Apache Iceberg</text>
  <text x="450" y="510" text-anchor="middle" font-size="11" fill="#cbd5e1">ACID transactions · schema &amp; partition evolution · time travel · row-level updates (v3: deletion vectors, row lineage)</text>

  <!-- Arrow down from format to storage -->
  <line x1="450" y1="530" x2="450" y2="558" stroke="#2C3E50" stroke-width="1.8" marker-end="url(#arrow-flow)"/>

  <!-- Cloud Storage Layer -->
  <text x="80" y="578" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">CLOUD OBJECT STORAGE — single canonical copy, owned by the enterprise</text>
  <rect x="80" y="588" width="740" height="28" rx="6" fill="#ffffff" stroke="#2C3E50" stroke-width="1.5"/>
  <text x="450" y="607" text-anchor="middle" font-size="12" fill="#2C3E50">Parquet data files + Iceberg metadata  ·  Amazon S3  ·  Azure Data Lake Storage  ·  Google Cloud Storage</text>
</svg>
