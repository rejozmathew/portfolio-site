<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow-flow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2C3E50"/>
    </marker>
    <marker id="arrow-push" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2A7F62"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="660" fill="#f9fafb"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#2C3E50">The Open Lakehouse Stack</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#64748b">Four layers, each independently evolvable, with coordinated governance above</text>

  <!-- Compute Engines Layer -->
  <text x="80" y="100" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">COMPUTE ENGINES</text>
  <rect x="80" y="110" width="740" height="95" rx="10" fill="#ffffff" stroke="#1F4E79" stroke-width="2"/>

  <rect x="120" y="130" width="280" height="60" rx="6" fill="#1F4E79"/>
  <text x="260" y="156" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Snowflake</text>
  <text x="260" y="176" text-anchor="middle" font-size="11" fill="#cbd5e1">SQL analytics, BI, Dynamic Tables, Cortex AI</text>

  <rect x="500" y="130" width="280" height="60" rx="6" fill="#1F4E79"/>
  <text x="640" y="156" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Databricks</text>
  <text x="640" y="176" text-anchor="middle" font-size="11" fill="#cbd5e1">Spark ETL, notebooks, MLflow, GPU clusters</text>

  <!-- Arrow down between engines and coordination layer -->
  <line x1="450" y1="210" x2="450" y2="248" stroke="#2C3E50" stroke-width="1.8" marker-end="url(#arrow-flow)"/>
  <text x="465" y="234" font-size="10" fill="#64748b" font-style="italic">reads / writes</text>

  <!-- Governance Coordination Layer -->
  <text x="80" y="268" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">GOVERNANCE COORDINATION — policy source of truth across engines</text>
  <rect x="80" y="278" width="740" height="120" rx="10" fill="#ffffff" stroke="#2A7F62" stroke-width="2"/>

  <!-- Central coordination box -->
  <rect x="180" y="295" width="540" height="52" rx="6" fill="#2A7F62"/>
  <text x="450" y="317" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Governance Coordination Layer</text>
  <text x="450" y="336" text-anchor="middle" font-size="10" fill="#ffffff">Collibra / Atlan / purpose-built — policies defined once, pushed to each catalog</text>

  <!-- Native catalogs below the coordination layer -->
  <rect x="110" y="358" width="200" height="32" rx="5" fill="#ffffff" stroke="#1F4E79" stroke-width="1.2"/>
  <text x="210" y="379" text-anchor="middle" font-size="11" font-weight="600" fill="#1F4E79">Snowflake Horizon</text>

  <rect x="590" y="358" width="200" height="32" rx="5" fill="#ffffff" stroke="#1F4E79" stroke-width="1.2"/>
  <text x="690" y="379" text-anchor="middle" font-size="11" font-weight="600" fill="#1F4E79">Unity Catalog</text>

  <!-- Push-down arrows from coordination layer to native catalogs -->
  <line x1="310" y1="347" x2="250" y2="358" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#arrow-push)"/>
  <line x1="590" y1="347" x2="650" y2="358" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#arrow-push)"/>

  <!-- Lineage stitching annotation -->
  <text x="450" y="410" text-anchor="middle" font-size="10" font-style="italic" fill="#2A7F62">Policies pushed down to native catalogs · End-to-end lineage stitched across engines · Drift detected as anomaly</text>

  <!-- Arrow down from governance to format -->
  <line x1="450" y1="420" x2="450" y2="455" stroke="#2C3E50" stroke-width="1.8" marker-end="url(#arrow-flow)"/>

  <!-- Iceberg Format Layer -->
  <text x="80" y="475" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">OPEN TABLE FORMAT</text>
  <rect x="80" y="485" width="740" height="65" rx="10" fill="#1F4E79"/>
  <text x="450" y="512" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Apache Iceberg</text>
  <text x="450" y="535" text-anchor="middle" font-size="11" fill="#cbd5e1">ACID transactions · schema &amp; partition evolution · time travel · v3: deletion vectors, row lineage</text>

  <!-- Arrow down from format to storage -->
  <line x1="450" y1="555" x2="450" y2="588" stroke="#2C3E50" stroke-width="1.8" marker-end="url(#arrow-flow)"/>

  <!-- Cloud Storage Layer -->
  <text x="80" y="608" font-size="12" font-weight="700" fill="#64748b" letter-spacing="1">CLOUD OBJECT STORAGE — single canonical copy, owned by the enterprise</text>
  <rect x="80" y="618" width="740" height="30" rx="6" fill="#ffffff" stroke="#2C3E50" stroke-width="1.5"/>
  <text x="450" y="638" text-anchor="middle" font-size="12" fill="#2C3E50">Parquet data files + Iceberg metadata  ·  Amazon S3  ·  Azure Data Lake Storage  ·  Google Cloud Storage</text>
</svg>
