<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds2" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1F4E79"/>
    </marker>
    <marker id="arrTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2A7F62"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="420" fill="#f9fafb" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="920" height="56" fill="url(#hg2)" rx="12"/>
  <rect x="0" y="28" width="920" height="28" fill="url(#hg2)"/>
  <text x="460" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Breakage Measurement — The Detection Window</text>

  <!-- Timeline axis -->
  <line x1="80" y1="200" x2="840" y2="200" stroke="#2C3E50" stroke-width="2"/>
  <!-- Arrow at end -->
  <polygon points="840,195 855,200 840,205" fill="#2C3E50"/>

  <!-- Visit Start marker -->
  <line x1="120" y1="180" x2="120" y2="220" stroke="#1F4E79" stroke-width="3"/>
  <circle cx="120" cy="200" r="6" fill="#1F4E79"/>
  <text x="120" y="245" text-anchor="middle" fill="#1F4E79" font-size="12" font-weight="700">Visit Start</text>
  <text x="120" y="260" text-anchor="middle" fill="#6b7280" font-size="10">App/Web Login</text>

  <!-- 1 min marker -->
  <line x1="220" y1="185" x2="220" y2="215" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="220" y="175" text-anchor="middle" fill="#6b7280" font-size="10" font-weight="600">+1 min</text>

  <!-- Visit End marker -->
  <line x1="420" y1="180" x2="420" y2="220" stroke="#1F4E79" stroke-width="3"/>
  <circle cx="420" cy="200" r="6" fill="#1F4E79"/>
  <text x="420" y="245" text-anchor="middle" fill="#1F4E79" font-size="12" font-weight="700">Visit End</text>
  <text x="420" y="260" text-anchor="middle" fill="#6b7280" font-size="10">Session Closes</text>

  <!-- 60 min after end marker -->
  <line x1="720" y1="180" x2="720" y2="220" stroke="#c0392b" stroke-width="3"/>
  <circle cx="720" cy="200" r="6" fill="#c0392b"/>
  <text x="720" y="245" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="700">+60 min</text>
  <text x="720" y="260" text-anchor="middle" fill="#6b7280" font-size="10">After Visit End</text>

  <!-- Excluded zone (before 1 min) -->
  <rect x="120" y="186" width="100" height="28" rx="0" fill="#f3f4f6" opacity="0.6"/>
  <text x="170" y="165" text-anchor="middle" fill="#9ca3af" font-size="9" font-weight="600">EXCLUDED</text>
  <text x="170" y="155" text-anchor="middle" fill="#9ca3af" font-size="8">(IVR / auto-dial noise)</text>

  <!-- Breakage window -->
  <rect x="220" y="186" width="500" height="28" rx="0" fill="#c0392b" opacity="0.08"/>
  <rect x="220" y="186" width="500" height="28" rx="0" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Breakage window label -->
  <text x="470" y="136" text-anchor="middle" fill="#c0392b" font-size="14" font-weight="700">BREAKAGE DETECTION WINDOW</text>
  <line x1="220" y1="145" x2="470" y2="145" stroke="#c0392b" stroke-width="1"/>
  <line x1="470" y1="145" x2="720" y2="145" stroke="#c0392b" stroke-width="1"/>
  <line x1="220" y1="145" x2="220" y2="155" stroke="#c0392b" stroke-width="1"/>
  <line x1="720" y1="145" x2="720" y2="155" stroke="#c0392b" stroke-width="1"/>

  <!-- Call icons in the window -->
  <!-- Breakage call example -->
  <g transform="translate(350, 96)">
    <rect x="0" y="0" width="18" height="26" rx="4" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="1"/>
    <circle cx="9" cy="22" r="2" fill="#c0392b"/>
    <line x1="9" y1="30" x2="9" y2="60" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
  <text x="350" y="90" fill="#c0392b" font-size="9" font-weight="600">Call during visit</text>
  <text x="350" y="80" fill="#c0392b" font-size="9">= BREAKAGE</text>

  <g transform="translate(580, 96)">
    <rect x="0" y="0" width="18" height="26" rx="4" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="1"/>
    <circle cx="9" cy="22" r="2" fill="#c0392b"/>
    <line x1="9" y1="30" x2="9" y2="60" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3,2"/>
  </g>
  <text x="580" y="90" fill="#c0392b" font-size="9" font-weight="600">Call after visit</text>
  <text x="580" y="80" fill="#c0392b" font-size="9">= BREAKAGE</text>

  <!-- Formula box -->
  <g filter="url(#ds2)">
    <rect x="100" y="290" width="720" height="110" rx="10" fill="#ffffff" stroke="#1F4E79" stroke-width="1.5"/>
  </g>

  <text x="460" y="318" text-anchor="middle" fill="#1F4E79" font-size="13" font-weight="700">Metric Definitions</text>
  <line x1="140" y1="328" x2="780" y2="328" stroke="#e2e8f0" stroke-width="1"/>

  <!-- App breakage formula -->
  <text x="160" y="352" fill="#2C3E50" font-size="11" font-weight="600">Digital Breakage % (App)</text>
  <text x="160" y="370" fill="#6b7280" font-size="10.5">= Total breakage calls from app ÷ Total app visits in period</text>

  <!-- Web breakage formula -->
  <text x="160" y="390" fill="#2C3E50" font-size="11" font-weight="600">Digital Breakage % (Web)</text>
  <text x="540" y="352" fill="#2C3E50" font-size="11" font-weight="600">Call Breakage</text>
  <text x="540" y="370" fill="#6b7280" font-size="10.5">= Calls between 1 min after visit start</text>
  <text x="540" y="386" fill="#6b7280" font-size="10.5">  and 60 min after visit end</text>
</svg>
