<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds5" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <linearGradient id="cg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1F4E79"/>
    </marker>
    <marker id="a5t" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2A7F62"/>
    </marker>
    <marker id="a5o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="540" fill="#f9fafb" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="920" height="56" fill="url(#hg5)" rx="12"/>
  <rect x="0" y="28" width="920" height="28" fill="url(#hg5)"/>
  <text x="460" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Intent Discovery — BERTopic with Cascading Outlier Reduction</text>

  <!-- Stage 1: Raw Chat Data -->
  <g filter="url(#ds5)">
    <rect x="25" y="82" width="120" height="100" rx="8" fill="url(#cg5)" stroke="#1F4E79" stroke-width="1.5"/>
  </g>
  <text x="85" y="106" text-anchor="middle" fill="#1F4E79" font-size="11" font-weight="700">Chat Transcripts</text>
  <text x="85" y="124" text-anchor="middle" fill="#6b7280" font-size="9.5">Live messages</text>
  <text x="85" y="139" text-anchor="middle" fill="#6b7280" font-size="9.5">(Freshworks)</text>
  <text x="85" y="165" text-anchor="middle" fill="#2C3E50" font-size="8.5">Customer + Agent msgs</text>

  <!-- Arrow -->
  <line x1="145" y1="132" x2="170" y2="132" stroke="#1F4E79" stroke-width="2" marker-end="url(#a5)"/>

  <!-- Stage 2: Embedding -->
  <g filter="url(#ds5)">
    <rect x="180" y="82" width="130" height="100" rx="8" fill="url(#cg5)" stroke="#1F4E79" stroke-width="1.5"/>
  </g>
  <text x="245" y="106" text-anchor="middle" fill="#1F4E79" font-size="11" font-weight="700">BERT Embedding</text>
  <text x="245" y="124" text-anchor="middle" fill="#6b7280" font-size="9.5">Transformer encodes</text>
  <text x="245" y="139" text-anchor="middle" fill="#6b7280" font-size="9.5">customer responses</text>
  <text x="245" y="165" text-anchor="middle" fill="#2C3E50" font-size="8.5">→ Dense vectors</text>

  <!-- Arrow -->
  <line x1="310" y1="132" x2="335" y2="132" stroke="#1F4E79" stroke-width="2" marker-end="url(#a5)"/>

  <!-- Stage 3: PASS 1 - BERTopic -->
  <g filter="url(#ds5)">
    <rect x="345" y="74" width="170" height="116" rx="8" fill="url(#cg5)" stroke="#2A7F62" stroke-width="2"/>
  </g>
  <rect x="345" y="74" width="170" height="30" rx="8" fill="#2A7F62"/>
  <rect x="345" y="90" width="170" height="14" fill="#2A7F62"/>
  <text x="430" y="95" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">PASS 1 — BERTopic</text>
  <text x="430" y="122" text-anchor="middle" fill="#6b7280" font-size="9.5">HDBSCAN clustering</text>
  <text x="430" y="137" text-anchor="middle" fill="#6b7280" font-size="9.5">+ class-based TF-IDF</text>
  <text x="430" y="152" text-anchor="middle" fill="#6b7280" font-size="9.5">topic representation</text>
  <text x="430" y="175" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="600">336K+ messages classified</text>

  <!-- Arrow to classified topics -->
  <line x1="515" y1="115" x2="545" y2="115" stroke="#2A7F62" stroke-width="2" marker-end="url(#a5t)"/>

  <!-- Stage 4: Classified Topics -->
  <g filter="url(#ds5)">
    <rect x="555" y="74" width="160" height="116" rx="8" fill="url(#cg5)" stroke="#2A7F62" stroke-width="1.5"/>
  </g>
  <text x="635" y="97" text-anchor="middle" fill="#2A7F62" font-size="11" font-weight="700">Classified Intents</text>
  <line x1="570" y1="105" x2="700" y2="105" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="570" y="111" width="90" height="14" rx="3" fill="#e8f5e9"/>
  <text x="615" y="122" text-anchor="middle" fill="#2A7F62" font-size="8">Payments</text>
  <rect x="665" y="111" width="40" height="14" rx="3" fill="#e8f5e9"/>
  <text x="685" y="122" text-anchor="middle" fill="#2A7F62" font-size="7">19 subs</text>
  <rect x="570" y="129" width="90" height="14" rx="3" fill="#e8f5e9"/>
  <text x="615" y="140" text-anchor="middle" fill="#2A7F62" font-size="8">Loan Application</text>
  <rect x="570" y="147" width="90" height="14" rx="3" fill="#e8f5e9"/>
  <text x="615" y="158" text-anchor="middle" fill="#2A7F62" font-size="8">Disbursement</text>
  <rect x="570" y="165" width="90" height="14" rx="3" fill="#e8f5e9"/>
  <text x="615" y="176" text-anchor="middle" fill="#2A7F62" font-size="8">Support / General</text>

  <!-- Arrow to output -->
  <line x1="715" y1="132" x2="745" y2="132" stroke="#2A7F62" stroke-width="2" marker-end="url(#a5t)"/>

  <!-- Three-level taxonomy box -->
  <g filter="url(#ds5)">
    <rect x="755" y="74" width="140" height="116" rx="8" fill="#2A7F62" opacity="0.08" stroke="#2A7F62" stroke-width="1.5"/>
  </g>
  <text x="825" y="97" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="700">3-Level Taxonomy</text>
  <line x1="770" y1="105" x2="880" y2="105" stroke="#2A7F62" stroke-width="0.5" opacity="0.5"/>
  <text x="825" y="120" text-anchor="middle" fill="#2C3E50" font-size="9" font-weight="600">SERVICE_TYPE</text>
  <text x="825" y="133" text-anchor="middle" fill="#6b7280" font-size="8">Acquisition · Servicing</text>
  <text x="825" y="146" text-anchor="middle" fill="#2C3E50" font-size="9" font-weight="600">PRIMARY_CATEGORY</text>
  <text x="825" y="159" text-anchor="middle" fill="#6b7280" font-size="8">Payments · Loan App · …</text>
  <text x="825" y="172" text-anchor="middle" fill="#2C3E50" font-size="9" font-weight="600">SUB_CATEGORY</text>
  <text x="825" y="185" text-anchor="middle" fill="#6b7280" font-size="8">59 distinct intents</text>

  <!-- Arrow down from Pass 1 to outlier bucket -->
  <line x1="430" y1="190" x2="430" y2="225" stroke="#e67e22" stroke-width="2" marker-end="url(#a5o)"/>
  <text x="445" y="212" fill="#e67e22" font-size="9" font-weight="600">Unclassified</text>

  <!-- Outlier Bucket -->
  <g filter="url(#ds5)">
    <rect x="320" y="235" width="220" height="70" rx="8" fill="url(#cg5)" stroke="#e67e22" stroke-width="2"/>
  </g>
  <text x="430" y="258" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="700">"Outlier" Bucket</text>
  <text x="430" y="276" text-anchor="middle" fill="#6b7280" font-size="9.5">Messages that don't fit Pass 1 clusters</text>
  <text x="430" y="293" text-anchor="middle" fill="#e67e22" font-size="9.5" font-weight="600">Significant volume — needs further analysis</text>

  <!-- Arrow down to Pass 2 -->
  <line x1="430" y1="305" x2="430" y2="335" stroke="#e67e22" stroke-width="2" marker-end="url(#a5o)"/>

  <!-- Pass 2 - BERTopic on outliers -->
  <g filter="url(#ds5)">
    <rect x="300" y="345" width="260" height="90" rx="8" fill="url(#cg5)" stroke="#e67e22" stroke-width="2"/>
  </g>
  <rect x="300" y="345" width="260" height="28" rx="8" fill="#e67e22"/>
  <rect x="300" y="360" width="260" height="13" fill="#e67e22"/>
  <text x="430" y="366" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">PASS 2 — BERTopic on Outlier Subset</text>
  <text x="430" y="396" text-anchor="middle" fill="#6b7280" font-size="9.5">Re-trained with adjusted density parameters</text>
  <text x="430" y="412" text-anchor="middle" fill="#6b7280" font-size="9.5">on the smaller, more ambiguous message set</text>
  <text x="430" y="428" text-anchor="middle" fill="#e67e22" font-size="9" font-weight="600">Discovers intents hidden inside the noise</text>

  <!-- Arrow right to recovered topics -->
  <line x1="560" y1="390" x2="595" y2="390" stroke="#2A7F62" stroke-width="2" marker-end="url(#a5t)"/>

  <!-- Recovered topics -->
  <g filter="url(#ds5)">
    <rect x="605" y="345" width="170" height="90" rx="8" fill="url(#cg5)" stroke="#2A7F62" stroke-width="1.5"/>
  </g>
  <text x="690" y="368" text-anchor="middle" fill="#2A7F62" font-size="11" font-weight="700">Recovered Intents</text>
  <line x1="620" y1="376" x2="760" y2="376" stroke="#e2e8f0" stroke-width="1"/>
  <text x="690" y="393" text-anchor="middle" fill="#2C3E50" font-size="9.5">Previously ambiguous messages</text>
  <text x="690" y="408" text-anchor="middle" fill="#2C3E50" font-size="9.5">now assigned to topics</text>
  <text x="690" y="426" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="600">Merged back into main taxonomy</text>

  <!-- Arrow down from Pass 2 to residual -->
  <line x1="430" y1="435" x2="430" y2="460" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Final residual -->
  <g filter="url(#ds5)">
    <rect x="310" y="468" width="240" height="52" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  </g>
  <text x="430" y="490" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="700">Residual Outliers</text>
  <text x="430" y="508" text-anchor="middle" fill="#9ca3af" font-size="10">Truly unclassifiable — only 0.4% of total volume</text>

  <!-- Result summary box -->
  <g filter="url(#ds5)">
    <rect x="620" y="460" width="270" height="65" rx="8" fill="#2A7F62" opacity="0.08" stroke="#2A7F62" stroke-width="1.5"/>
  </g>
  <text x="755" y="482" text-anchor="middle" fill="#2A7F62" font-size="11" font-weight="700">Coverage After Two Passes</text>
  <text x="755" y="500" text-anchor="middle" fill="#2A7F62" font-size="18" font-weight="700">99.6%</text>
  <text x="755" y="516" text-anchor="middle" fill="#6b7280" font-size="9">of messages assigned to a meaningful intent</text>

  <!-- Bot/Agent dimension note -->
  <g filter="url(#ds5)">
    <rect x="25" y="240" width="260" height="52" rx="8" fill="url(#cg5)" stroke="#1F4E79" stroke-width="1"/>
  </g>
  <text x="155" y="261" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="600">Additional Dimension: Bot vs. Agent</text>
  <text x="155" y="279" text-anchor="middle" fill="#6b7280" font-size="9">Each message tagged as Bot or Non-Bot,</text>
  <text x="155" y="292" text-anchor="middle" fill="#6b7280" font-size="8.5">enabling escalation pattern analysis</text>
</svg>
