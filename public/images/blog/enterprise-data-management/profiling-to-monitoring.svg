<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="shadow4" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1F4E79" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="hGrad4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <marker id="arrowNav" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#1F4E79"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="#2A7F62"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#f9fafb" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="60" fill="url(#hGrad4)" rx="12"/>
  <rect x="0" y="30" width="900" height="30" fill="url(#hGrad4)"/>
  <text x="450" y="38" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700" letter-spacing="0.5">From Profiling to Ongoing Quality Monitoring</text>

  <!-- Phase 1: Profile -->
  <g filter="url(#shadow4)">
    <rect x="30" y="90" width="185" height="220" rx="10" fill="#ffffff" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="30" y="90" width="185" height="42" rx="10" fill="#1F4E79"/>
    <rect x="30" y="112" width="185" height="20" fill="#1F4E79"/>
  </g>
  <circle cx="55" cy="111" r="12" fill="rgba(255,255,255,0.2)"/>
  <text x="55" y="116" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">1</text>
  <text x="130" y="116" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Profile</text>
  <text x="50" y="155" fill="#2C3E50" font-size="10.5">Null / completeness rates</text>
  <text x="50" y="173" fill="#2C3E50" font-size="10.5">Min / max / avg / skew</text>
  <text x="50" y="191" fill="#2C3E50" font-size="10.5">Unique value counts</text>
  <text x="50" y="209" fill="#2C3E50" font-size="10.5">Duplicate percentage</text>
  <text x="50" y="227" fill="#2C3E50" font-size="10.5">Data type validation</text>
  <text x="50" y="245" fill="#2C3E50" font-size="10.5">Cardinality analysis</text>
  <rect x="45" y="265" width="155" height="26" rx="5" fill="#e8f0fe"/>
  <text x="122" y="282" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">Point-in-time snapshot</text>

  <!-- Arrow 1→2 -->
  <line x1="218" y1="200" x2="248" y2="200" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrowNav)"/>

  <!-- Phase 2: Enrich -->
  <g filter="url(#shadow4)">
    <rect x="255" y="90" width="185" height="220" rx="10" fill="#ffffff" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="255" y="90" width="185" height="42" rx="10" fill="#1F4E79"/>
    <rect x="255" y="112" width="185" height="20" fill="#1F4E79"/>
  </g>
  <circle cx="280" cy="111" r="12" fill="rgba(255,255,255,0.2)"/>
  <text x="280" y="116" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">2</text>
  <text x="355" y="116" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Enrich</text>
  <text x="275" y="155" fill="#2C3E50" font-size="10.5">Business definitions</text>
  <text x="275" y="173" fill="#2C3E50" font-size="10.5">PII / sensitivity flags</text>
  <text x="275" y="191" fill="#2C3E50" font-size="10.5">Domain classification</text>
  <text x="275" y="209" fill="#2C3E50" font-size="10.5">Ownership assignment</text>
  <text x="275" y="227" fill="#2C3E50" font-size="10.5">Lineage documentation</text>
  <text x="275" y="245" fill="#2C3E50" font-size="10.5">Access pattern notes</text>
  <rect x="270" y="265" width="155" height="26" rx="5" fill="#e8f0fe"/>
  <text x="347" y="282" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">Human-curated metadata</text>

  <!-- Arrow 2→3 -->
  <line x1="443" y1="200" x2="473" y2="200" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrowNav)"/>

  <!-- Phase 3: Quality Rules -->
  <g filter="url(#shadow4)">
    <rect x="480" y="90" width="185" height="220" rx="10" fill="#ffffff" stroke="#2A7F62" stroke-width="1.5"/>
    <rect x="480" y="90" width="185" height="42" rx="10" fill="#2A7F62"/>
    <rect x="480" y="112" width="185" height="20" fill="#2A7F62"/>
  </g>
  <circle cx="505" cy="111" r="12" fill="rgba(255,255,255,0.2)"/>
  <text x="505" y="116" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">3</text>
  <text x="580" y="116" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Quality Rules</text>
  <text x="500" y="155" fill="#2C3E50" font-size="10.5">Completeness checks</text>
  <text x="500" y="173" fill="#2C3E50" font-size="10.5">Validity constraints</text>
  <text x="500" y="191" fill="#2C3E50" font-size="10.5">Consistency rules</text>
  <text x="500" y="209" fill="#2C3E50" font-size="10.5">Timeliness / freshness</text>
  <text x="500" y="227" fill="#2C3E50" font-size="10.5">Uniqueness assertions</text>
  <text x="500" y="245" fill="#2C3E50" font-size="10.5">Cross-table referential</text>
  <rect x="495" y="265" width="155" height="26" rx="5" fill="#e8f5e9"/>
  <text x="572" y="282" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">Codified expectations</text>

  <!-- Arrow 3→4 -->
  <line x1="668" y1="200" x2="698" y2="200" stroke="#2A7F62" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- Phase 4: Monitor -->
  <g filter="url(#shadow4)">
    <rect x="705" y="90" width="170" height="220" rx="10" fill="#ffffff" stroke="#2A7F62" stroke-width="1.5"/>
    <rect x="705" y="90" width="170" height="42" rx="10" fill="#2A7F62"/>
    <rect x="705" y="112" width="170" height="20" fill="#2A7F62"/>
  </g>
  <circle cx="730" cy="111" r="12" fill="rgba(255,255,255,0.2)"/>
  <text x="730" y="116" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">4</text>
  <text x="798" y="116" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Monitor</text>
  <text x="725" y="155" fill="#2C3E50" font-size="10.5">Automated ML-based</text>
  <text x="725" y="173" fill="#2C3E50" font-size="10.5">anomaly detection</text>
  <text x="725" y="196" fill="#2C3E50" font-size="10.5">Root cause analysis</text>
  <text x="725" y="219" fill="#2C3E50" font-size="10.5">Alert &amp; triage workflows</text>
  <text x="725" y="242" fill="#2C3E50" font-size="10.5">Trend visualization</text>
  <rect x="720" y="265" width="140" height="26" rx="5" fill="#e8f5e9"/>
  <text x="790" y="282" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">Continuous assurance</text>

  <!-- Feedback loop arrow (bottom) -->
  <path d="M790,315 L790,370 L122,370 L122,315" fill="none" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="122,318 117,330 127,330" fill="#7f8c8d"/>
  <text x="456" y="388" text-anchor="middle" fill="#7f8c8d" font-size="10.5" font-style="italic">Anomalies detected → re-profile → update rules → refine monitoring</text>

  <!-- Integration note -->
  <rect x="200" y="340" width="500" height="28" rx="6" fill="#fff3e0" stroke="#e67e22" stroke-width="1"/>
  <text x="450" y="359" text-anchor="middle" fill="#e67e22" font-size="10.5" font-weight="600">Catalogue Integration: each step feeds metadata back into the data catalogue</text>
</svg>
