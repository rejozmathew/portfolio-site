<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="shadow3" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1F4E79" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="hGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#f9fafb" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="60" fill="url(#hGrad3)" rx="12"/>
  <rect x="0" y="30" width="900" height="30" fill="url(#hGrad3)"/>
  <text x="450" y="38" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700" letter-spacing="0.5">Data Cataloguing Framework: What Gets Captured</text>

  <!-- Dataset-level metadata (left panel) -->
  <g filter="url(#shadow3)">
    <rect x="30" y="80" width="400" height="490" rx="10" fill="#ffffff" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="30" y="80" width="400" height="48" rx="10" fill="#1F4E79"/>
    <rect x="30" y="108" width="400" height="20" fill="#1F4E79"/>
  </g>
  <text x="230" y="110" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Dataset-Level Metadata</text>

  <!-- Dataset metadata rows -->
  <g transform="translate(50, 145)">
    <!-- Row template: label + value area -->
    <rect x="0" y="0" width="360" height="32" rx="4" fill="#e8f0fe"/>
    <text x="10" y="21" fill="#1F4E79" font-size="11" font-weight="600">Dataset Name</text>
    <text x="150" y="21" fill="#2C3E50" font-size="11">V_CLB_BASIC.BNK_LOAN_ACCT</text>

    <rect x="0" y="38" width="360" height="32" rx="4" fill="#f8f9fa"/>
    <text x="10" y="59" fill="#1F4E79" font-size="11" font-weight="600">Business Description</text>
    <text x="150" y="59" fill="#2C3E50" font-size="11">Plain-language purpose and context</text>

    <rect x="0" y="76" width="360" height="32" rx="4" fill="#e8f0fe"/>
    <text x="10" y="97" fill="#1F4E79" font-size="11" font-weight="600">Domain Area</text>
    <rect x="150" y="82" width="65" height="20" rx="4" fill="#2A7F62"/>
    <text x="182" y="96" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="600">Accounts</text>
    <rect x="220" y="82" width="68" height="20" rx="4" fill="#1F4E79" opacity="0.2"/>
    <text x="254" y="96" text-anchor="middle" fill="#1F4E79" font-size="9">Customer</text>
    <rect x="293" y="82" width="60" height="20" rx="4" fill="#1F4E79" opacity="0.2"/>
    <text x="323" y="96" text-anchor="middle" fill="#1F4E79" font-size="9">Txn</text>

    <rect x="0" y="114" width="360" height="32" rx="4" fill="#f8f9fa"/>
    <text x="10" y="135" fill="#1F4E79" font-size="11" font-weight="600">Source System</text>
    <text x="150" y="135" fill="#2C3E50" font-size="11">Origin system and extract method</text>

    <rect x="0" y="152" width="360" height="32" rx="4" fill="#e8f0fe"/>
    <text x="10" y="173" fill="#1F4E79" font-size="11" font-weight="600">Refresh Frequency</text>
    <text x="150" y="173" fill="#2C3E50" font-size="11">Daily / Weekly / Monthly / Event</text>

    <rect x="0" y="190" width="360" height="32" rx="4" fill="#f8f9fa"/>
    <text x="10" y="211" fill="#1F4E79" font-size="11" font-weight="600">Data Steward</text>
    <text x="150" y="211" fill="#2C3E50" font-size="11">Accountable business owner</text>

    <rect x="0" y="228" width="360" height="32" rx="4" fill="#e8f0fe"/>
    <text x="10" y="249" fill="#1F4E79" font-size="11" font-weight="600">Lineage Context</text>
    <text x="150" y="249" fill="#2C3E50" font-size="11">Upstream sources, downstream consumers</text>

    <rect x="0" y="266" width="360" height="32" rx="4" fill="#f8f9fa"/>
    <text x="10" y="287" fill="#1F4E79" font-size="11" font-weight="600">Record Count</text>
    <text x="150" y="287" fill="#2C3E50" font-size="11">3,586,246 (as of last profile)</text>

    <rect x="0" y="304" width="360" height="32" rx="4" fill="#e8f0fe"/>
    <text x="10" y="325" fill="#1F4E79" font-size="11" font-weight="600">Sample Queries</text>
    <text x="150" y="325" fill="#2C3E50" font-size="11">Common analytical access patterns</text>

    <rect x="0" y="342" width="360" height="32" rx="4" fill="#f8f9fa"/>
    <text x="10" y="363" fill="#1F4E79" font-size="11" font-weight="600">DQ Score</text>
    <rect x="150" y="348" width="80" height="16" rx="3" fill="#e8f5e9"/>
    <rect x="150" y="348" width="68" height="16" rx="3" fill="#2A7F62"/>
    <text x="240" y="362" fill="#2A7F62" font-size="10" font-weight="600">85%</text>

    <rect x="0" y="380" width="360" height="32" rx="4" fill="#e8f0fe"/>
    <text x="10" y="401" fill="#1F4E79" font-size="11" font-weight="600">Priority Tier</text>
    <rect x="150" y="386" width="42" height="18" rx="4" fill="#c0392b"/>
    <text x="171" y="399" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="600">High</text>
    <rect x="198" y="386" width="50" height="18" rx="4" fill="#1F4E79" opacity="0.2"/>
    <text x="223" y="399" text-anchor="middle" fill="#1F4E79" font-size="9">Medium</text>
    <rect x="254" y="386" width="38" height="18" rx="4" fill="#1F4E79" opacity="0.2"/>
    <text x="273" y="399" text-anchor="middle" fill="#1F4E79" font-size="9">Low</text>
  </g>

  <!-- Attribute-level metadata (right panel) -->
  <g filter="url(#shadow3)">
    <rect x="460" y="80" width="410" height="490" rx="10" fill="#ffffff" stroke="#2A7F62" stroke-width="1.5"/>
    <rect x="460" y="80" width="410" height="48" rx="10" fill="#2A7F62"/>
    <rect x="460" y="108" width="410" height="20" fill="#2A7F62"/>
  </g>
  <text x="665" y="110" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Attribute-Level Metadata</text>

  <!-- Attribute metadata rows -->
  <g transform="translate(480, 145)">
    <rect x="0" y="0" width="370" height="32" rx="4" fill="#e8f5e9"/>
    <text x="10" y="21" fill="#2A7F62" font-size="11" font-weight="600">Attribute Name</text>
    <text x="155" y="21" fill="#2C3E50" font-size="11">INIT_LOAN_AMT</text>

    <rect x="0" y="38" width="370" height="32" rx="4" fill="#f8f9fa"/>
    <text x="10" y="59" fill="#2A7F62" font-size="11" font-weight="600">Business Definition</text>
    <text x="155" y="59" fill="#2C3E50" font-size="11">Original loan amount at origination</text>

    <rect x="0" y="76" width="370" height="32" rx="4" fill="#e8f5e9"/>
    <text x="10" y="97" fill="#2A7F62" font-size="11" font-weight="600">Data Type</text>
    <text x="155" y="97" fill="#2C3E50" font-size="11">DECIMAL(20,4)</text>

    <rect x="0" y="114" width="370" height="32" rx="4" fill="#f8f9fa"/>
    <text x="10" y="135" fill="#2A7F62" font-size="11" font-weight="600">PII / Sensitive</text>
    <rect x="155" y="120" width="30" height="18" rx="4" fill="#e8f5e9" stroke="#2A7F62" stroke-width="1"/>
    <text x="170" y="133" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="600">No</text>
    <text x="195" y="135" fill="#7f8c8d" font-size="10">PII · PCI · PHI flags</text>

    <rect x="0" y="152" width="370" height="32" rx="4" fill="#e8f5e9"/>
    <text x="10" y="173" fill="#2A7F62" font-size="11" font-weight="600">Domain Tags</text>
    <rect x="155" y="158" width="65" height="18" rx="9" fill="#e8f0fe" stroke="#1F4E79" stroke-width="0.8"/>
    <text x="187" y="171" text-anchor="middle" fill="#1F4E79" font-size="9">Origination</text>
    <rect x="225" y="158" width="55" height="18" rx="9" fill="#e8f0fe" stroke="#1F4E79" stroke-width="0.8"/>
    <text x="252" y="171" text-anchor="middle" fill="#1F4E79" font-size="9">Lending</text>

    <rect x="0" y="190" width="370" height="32" rx="4" fill="#f8f9fa"/>
    <text x="10" y="211" fill="#2A7F62" font-size="11" font-weight="600">Hierarchy</text>
    <text x="155" y="211" fill="#2C3E50" font-size="11">Account → Loan → Origination</text>

    <rect x="0" y="228" width="370" height="55" rx="4" fill="#e8f5e9"/>
    <text x="10" y="249" fill="#2A7F62" font-size="11" font-weight="600">Profile Highlights</text>
    <text x="155" y="249" fill="#2C3E50" font-size="10">Null: 0% · Min: 10 · Max: 1,674,400</text>
    <text x="155" y="266" fill="#2C3E50" font-size="10">Avg: 14,313 · Unique: 67,543 · Dup: 98%</text>

    <rect x="0" y="289" width="370" height="45" rx="4" fill="#f8f9fa"/>
    <text x="10" y="310" fill="#2A7F62" font-size="11" font-weight="600">DQ Rules</text>
    <text x="155" y="310" fill="#2C3E50" font-size="10">NOT NULL · RANGE(0, 10M) · Anomaly watch</text>

    <rect x="0" y="340" width="370" height="45" rx="4" fill="#e8f5e9"/>
    <text x="10" y="361" fill="#2A7F62" font-size="11" font-weight="600">Notes</text>
    <text x="155" y="361" fill="#2C3E50" font-size="10">Skew of 3 — investigate long tail above</text>
    <text x="155" y="378" fill="#2C3E50" font-size="10">$500K for potential data quality issue</text>

    <rect x="0" y="391" width="370" height="32" rx="4" fill="#f8f9fa"/>
    <text x="10" y="412" fill="#2A7F62" font-size="11" font-weight="600">Last Profiled</text>
    <text x="155" y="412" fill="#2C3E50" font-size="11">2020-10-03 (auto-refresh quarterly)</text>
  </g>

  <!-- Connection arrow between panels -->
  <text x="445" y="325" text-anchor="middle" fill="#7f8c8d" font-size="24">→</text>
  <text x="445" y="345" text-anchor="middle" fill="#7f8c8d" font-size="9">1:N</text>
</svg>
