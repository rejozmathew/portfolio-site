<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds4" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <linearGradient id="cg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1F4E79"/>
    </marker>
    <marker id="a4t" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2A7F62"/>
    </marker>
    <marker id="a4r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c0392b"/>
    </marker>
  </defs>

  <rect width="920" height="480" fill="#f9fafb" rx="12"/>
  <rect x="0" y="0" width="920" height="56" fill="url(#hg4)" rx="12"/>
  <rect x="0" y="28" width="920" height="28" fill="url(#hg4)"/>
  <text x="460" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Three-Tier Matching Strategy — Cost-Managed Cascade</text>

  <!-- Tier labels -->
  <text x="150" y="82" text-anchor="middle" fill="#1F4E79" font-size="11" font-weight="700" letter-spacing="1">TIER 1: DETERMINISTIC</text>
  <text x="460" y="82" text-anchor="middle" fill="#1F4E79" font-size="11" font-weight="700" letter-spacing="1">TIER 2: PROBABILISTIC</text>
  <text x="770" y="82" text-anchor="middle" fill="#2A7F62" font-size="11" font-weight="700" letter-spacing="1">TIER 3: RAG PIPELINE</text>

  <!-- Vertical separators -->
  <line x1="305" y1="72" x2="305" y2="430" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="615" y1="72" x2="615" y2="430" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== TIER 1 ===== -->
  <g filter="url(#ds4)">
    <rect x="30" y="100" width="250" height="48" rx="8" fill="#1F4E79"/>
    <text x="155" y="122" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Exact-Key Join Engine</text>
    <text x="155" y="140" text-anchor="middle" fill="#c8dff0" font-size="10">CIF ↔ Account, AppID ↔ Loan</text>
  </g>
  <line x1="155" y1="148" x2="155" y2="170" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- Tier 1 results -->
  <g filter="url(#ds4)">
    <rect x="30" y="175" width="120" height="55" rx="6" fill="#e8f5f0" stroke="#2A7F62" stroke-width="1.5"/>
    <text x="90" y="198" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="700">MATCHED</text>
    <text x="90" y="220" text-anchor="middle" fill="#2C3E50" font-size="20" font-weight="700">~85%</text>
  </g>
  <g filter="url(#ds4)">
    <rect x="165" y="175" width="115" height="55" rx="6" fill="#fff5f5" stroke="#c0392b" stroke-width="1.2"/>
    <text x="222" y="198" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">UNMATCHED</text>
    <text x="222" y="220" text-anchor="middle" fill="#2C3E50" font-size="18" font-weight="700">~15%</text>
  </g>

  <!-- Arrow from Tier 1 unmatched to Tier 2 — clean horizontal -->
  <line x1="280" y1="202" x2="325" y2="202" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="325" y1="202" x2="325" y2="125" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="325" y1="125" x2="345" y2="125" stroke="#c0392b" stroke-width="1.5" marker-end="url(#a4r)"/>

  <!-- Cost annotation Tier 1 -->
  <rect x="40" y="245" width="230" height="22" rx="4" fill="#e8f0fe"/>
  <text x="155" y="260" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">Cost: ~zero (SQL joins)</text>

  <!-- ===== TIER 2 ===== -->
  <g filter="url(#ds4)">
    <rect x="350" y="100" width="240" height="68" rx="8" fill="#1F4E79"/>
    <text x="470" y="122" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Probabilistic Scoring</text>
    <text x="470" y="140" text-anchor="middle" fill="#c8dff0" font-size="9.5">Name similarity, SSN suffix match,</text>
    <text x="470" y="154" text-anchor="middle" fill="#c8dff0" font-size="9.5">date proximity, doc type heuristics</text>
  </g>
  <line x1="470" y1="168" x2="470" y2="190" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- Tier 2 results -->
  <g filter="url(#ds4)">
    <rect x="345" y="195" width="120" height="55" rx="6" fill="#e8f5f0" stroke="#2A7F62" stroke-width="1.5"/>
    <text x="405" y="218" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="700">MATCHED</text>
    <text x="405" y="240" text-anchor="middle" fill="#2C3E50" font-size="20" font-weight="700">~12%</text>
  </g>
  <g filter="url(#ds4)">
    <rect x="480" y="195" width="115" height="55" rx="6" fill="#fff5f5" stroke="#c0392b" stroke-width="1.2"/>
    <text x="537" y="218" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">UNMATCHED</text>
    <text x="537" y="240" text-anchor="middle" fill="#2C3E50" font-size="18" font-weight="700">~3%</text>
  </g>

  <!-- Arrow from Tier 2 unmatched to Tier 3 — clean horizontal -->
  <line x1="595" y1="222" x2="635" y2="222" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="635" y1="222" x2="635" y2="125" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="635" y1="125" x2="660" y2="125" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#a4t)"/>

  <!-- Cost annotation Tier 2 -->
  <rect x="355" y="265" width="230" height="22" rx="4" fill="#e8f0fe"/>
  <text x="470" y="280" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">Cost: low (scoring functions)</text>

  <!-- ===== TIER 3 ===== -->
  <g filter="url(#ds4)">
    <rect x="665" y="100" width="230" height="200" rx="8" fill="url(#cg4)" stroke="#2A7F62" stroke-width="1.8"/>
    <rect x="665" y="100" width="230" height="34" rx="8" fill="#2A7F62"/>
    <rect x="665" y="122" width="230" height="12" fill="#2A7F62"/>
    <text x="780" y="121" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">RAG Pipeline</text>

    <rect x="681" y="146" width="198" height="22" rx="4" fill="#e8f0fe" stroke="#1F4E79" stroke-width="0.8"/>
    <text x="780" y="161" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">OCR + LLM Extraction</text>

    <rect x="681" y="174" width="198" height="22" rx="4" fill="#fef9e7" stroke="#d4a017" stroke-width="0.8"/>
    <text x="780" y="189" text-anchor="middle" fill="#8a6d00" font-size="9.5" font-weight="600">PII Tokenization</text>

    <rect x="681" y="202" width="198" height="22" rx="4" fill="#e8f5f0" stroke="#2A7F62" stroke-width="0.8"/>
    <text x="780" y="217" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">R: Retrieve via vectors</text>

    <rect x="681" y="230" width="198" height="22" rx="4" fill="#e8f5f0" stroke="#2A7F62" stroke-width="0.8"/>
    <text x="780" y="245" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">A+G: Match + explain</text>

    <rect x="681" y="258" width="198" height="22" rx="4" fill="#fef9e7" stroke="#d4a017" stroke-width="0.8"/>
    <text x="780" y="273" text-anchor="middle" fill="#8a6d00" font-size="9.5" font-weight="600">Confidence routing + HITL</text>
  </g>

  <!-- Cost annotation Tier 3 -->
  <rect x="670" y="315" width="220" height="22" rx="4" fill="#e8f0fe"/>
  <text x="780" y="330" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">Cost: higher (LLM inference per doc)</text>

  <!-- Resolved annotation -->
  <g filter="url(#ds4)">
    <rect x="680" y="350" width="200" height="42" rx="6" fill="#e8f5f0" stroke="#2A7F62" stroke-width="1.2"/>
    <text x="780" y="368" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="700">RESOLVED</text>
    <text x="780" y="384" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">~2.5–3%</text>
  </g>

  <!-- Bottom: cumulative progress bar -->
  <rect x="30" y="412" width="860" height="56" rx="6" fill="#e8f0fe"/>
  <text x="460" y="430" text-anchor="middle" fill="#1F4E79" font-size="11" font-weight="700">Cumulative Match Rate</text>
  <rect x="60" y="440" width="595" height="14" rx="3" fill="#2A7F62"/>
  <rect x="655" y="440" width="85" height="14" rx="0" fill="#6db89b"/>
  <rect x="740" y="440" width="60" height="14" rx="3" fill="#a8d5c2"/>
  <text x="350" y="438" fill="#ffffff" font-size="9" font-weight="600">85% deterministic</text>
  <text x="697" y="438" fill="#2C3E50" font-size="8.5" font-weight="600">+12% prob.</text>
  <text x="770" y="438" fill="#2C3E50" font-size="8.5" font-weight="600">+3% RAG</text>
  <text x="460" y="462" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">30× cost reduction: cheapest methods first, RAG only for the residual that structured approaches can't reach</text>
</svg>
