<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds6" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <linearGradient id="cg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <marker id="a6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1F4E79"/>
    </marker>
  </defs>

  <rect width="940" height="520" fill="#f9fafb" rx="12"/>
  <rect x="0" y="0" width="940" height="56" fill="url(#hg6)" rx="12"/>
  <rect x="0" y="28" width="940" height="28" fill="url(#hg6)"/>
  <text x="470" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Deployment Architecture — One-Off vs. Recurring</text>

  <!-- Two columns -->
  <rect x="20" y="70" width="440" height="430" rx="8" fill="#e8f0fe" opacity="0.2"/>
  <text x="240" y="90" text-anchor="middle" fill="#1F4E79" font-size="11" font-weight="700" letter-spacing="1">WHAT WE BUILT (ONE-OFF MIGRATION)</text>

  <rect x="480" y="70" width="440" height="430" rx="8" fill="#e8f5f0" opacity="0.2"/>
  <text x="700" y="90" text-anchor="middle" fill="#2A7F62" font-size="11" font-weight="700" letter-spacing="1">RECURRING WORKFLOW PATTERN</text>

  <!-- ===== LEFT: One-off ===== -->
  <g filter="url(#ds6)">
    <rect x="35" y="108" width="410" height="44" rx="6" fill="#1F4E79"/>
    <text x="240" y="128" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Amazon S3 — Document Storage</text>
    <text x="240" y="144" text-anchor="middle" fill="#c8dff0" font-size="9.5">Scanned PDFs, faxes, forms · existing bucket</text>
  </g>
  <line x1="240" y1="152" x2="240" y2="170" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#a6)"/>

  <g filter="url(#ds6)">
    <rect x="35" y="175" width="195" height="44" rx="6" fill="url(#cg6)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="132" y="195" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Amazon Textract</text>
    <text x="132" y="211" text-anchor="middle" fill="#7f8c8d" font-size="9">OCR · API calls from S3</text>
  </g>
  <g filter="url(#ds6)">
    <rect x="250" y="175" width="195" height="44" rx="6" fill="url(#cg6)" stroke="#d4a017" stroke-width="1.2"/>
    <text x="347" y="195" text-anchor="middle" fill="#8a6d00" font-size="10" font-weight="600">PII Tokenization</text>
    <text x="347" y="211" text-anchor="middle" fill="#7f8c8d" font-size="9">Format-preserving · on-prem</text>
  </g>
  <line x1="240" y1="219" x2="240" y2="237" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#a6)"/>

  <g filter="url(#ds6)">
    <rect x="35" y="242" width="410" height="44" rx="6" fill="#2A7F62"/>
    <text x="240" y="262" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">AWS Bedrock — LLM Inference</text>
    <text x="240" y="278" text-anchor="middle" fill="#d4edda" font-size="9.5">Extraction + matching + explanation · VPC-isolated · batch API calls</text>
  </g>
  <line x1="240" y1="286" x2="240" y2="304" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#a6)"/>

  <g filter="url(#ds6)">
    <rect x="35" y="309" width="410" height="44" rx="6" fill="#1F4E79"/>
    <text x="240" y="329" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Snowflake — Metadata, Vectors, Audit Trail</text>
    <text x="240" y="345" text-anchor="middle" fill="#c8dff0" font-size="9.5">Central metadata repo · vector column · immutable audit log</text>
  </g>
  <line x1="240" y1="353" x2="240" y2="371" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#a6)"/>

  <g filter="url(#ds6)">
    <rect x="35" y="376" width="410" height="44" rx="6" fill="url(#cg6)" stroke="#d4a017" stroke-width="1.2"/>
    <text x="240" y="396" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Lightweight Review Application</text>
    <text x="240" y="412" text-anchor="middle" fill="#7f8c8d" font-size="9.5">Purpose-built for this migration · queues · approve/reject · audit writes</text>
  </g>

  <!-- Key principle callout -->
  <rect x="40" y="432" width="400" height="32" rx="5" fill="#fef9e7" stroke="#d4a017" stroke-width="1"/>
  <text x="240" y="447" text-anchor="middle" fill="#8a6d00" font-size="9.5" font-weight="700">All managed services · no GPUs to provision ·</text>
  <text x="240" y="459" text-anchor="middle" fill="#8a6d00" font-size="9.5" font-weight="700">no model hosting · retire tooling after migration</text>

  <!-- ===== RIGHT: Recurring ===== -->
  <g filter="url(#ds6)">
    <rect x="500" y="108" width="400" height="44" rx="6" fill="#2A7F62"/>
    <text x="700" y="128" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Containerized Embedding Service</text>
    <text x="700" y="144" text-anchor="middle" fill="#d4edda" font-size="9.5">GPU-backed · versioned models · auto-scaling</text>
  </g>
  <line x1="700" y1="152" x2="700" y2="170" stroke="#2A7F62" stroke-width="1.2" marker-end="url(#a6)"/>

  <g filter="url(#ds6)">
    <rect x="500" y="175" width="400" height="44" rx="6" fill="url(#cg6)" stroke="#2A7F62" stroke-width="1.2"/>
    <text x="700" y="195" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Managed Vector Database</text>
    <text x="700" y="211" text-anchor="middle" fill="#7f8c8d" font-size="9.5">Persistent · HA · automated backups · dedicated index</text>
  </g>
  <line x1="700" y1="219" x2="700" y2="237" stroke="#2A7F62" stroke-width="1.2" marker-end="url(#a6)"/>

  <g filter="url(#ds6)">
    <rect x="500" y="242" width="400" height="44" rx="6" fill="url(#cg6)" stroke="#2A7F62" stroke-width="1.2"/>
    <text x="700" y="262" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Pipeline Orchestrator (Airflow / Step Functions)</text>
    <text x="700" y="278" text-anchor="middle" fill="#7f8c8d" font-size="9.5">Scheduled runs · retry logic · alerting · DAG management</text>
  </g>
  <line x1="700" y1="286" x2="700" y2="304" stroke="#2A7F62" stroke-width="1.2" marker-end="url(#a6)"/>

  <g filter="url(#ds6)">
    <rect x="500" y="309" width="400" height="44" rx="6" fill="url(#cg6)" stroke="#2A7F62" stroke-width="1.2"/>
    <text x="700" y="329" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Model Monitoring &amp; Drift Detection</text>
    <text x="700" y="345" text-anchor="middle" fill="#7f8c8d" font-size="9.5">Embedding drift · confidence distributions · latency · cost tracking</text>
  </g>
  <line x1="700" y1="353" x2="700" y2="371" stroke="#2A7F62" stroke-width="1.2" marker-end="url(#a6)"/>

  <g filter="url(#ds6)">
    <rect x="500" y="376" width="400" height="44" rx="6" fill="#2A7F62"/>
    <text x="700" y="396" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Continuous Feedback Loop &amp; Retraining</text>
    <text x="700" y="412" text-anchor="middle" fill="#d4edda" font-size="9.5">Human review decisions inform model tuning</text>
  </g>

  <rect x="505" y="432" width="390" height="32" rx="5" fill="#e8f5f0" stroke="#2A7F62" stroke-width="1"/>
  <text x="700" y="447" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="700">Production-grade infrastructure ·</text>
  <text x="700" y="459" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="700">monitoring, versioning, and rollback are first-class</text>

  <!-- Bottom shared bar -->
  <rect x="20" y="488" width="900" height="22" rx="4" fill="#e8f0fe"/>
  <text x="470" y="503" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">Both patterns: all processing within enterprise cloud boundary · PII tokenized before cloud · immutable audit trail for every decision</text>
</svg>
