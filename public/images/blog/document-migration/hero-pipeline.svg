<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1F4E79"/>
    </marker>
    <marker id="arrT" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2A7F62"/>
    </marker>
  </defs>

  <rect width="960" height="440" fill="#f9fafb" rx="12"/>
  <rect x="0" y="0" width="960" height="56" fill="url(#hg)" rx="12"/>
  <rect x="0" y="28" width="960" height="28" fill="url(#hg)"/>
  <text x="480" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Matching Legacy Documents at Scale — End-to-End Pipeline</text>

  <!-- Phase labels row -->
  <text x="90" y="84" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700" letter-spacing="1">FRAGMENTED</text>
  <text x="90" y="95" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700">SOURCES</text>

  <text x="270" y="84" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700" letter-spacing="1">CENTRAL</text>
  <text x="270" y="95" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700">METADATA</text>

  <text x="450" y="84" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700" letter-spacing="1">TIERS 1 &amp; 2</text>
  <text x="450" y="95" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700">MATCHING</text>

  <text x="650" y="84" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="700" letter-spacing="1">TIER 3</text>
  <text x="650" y="95" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="700">RAG PIPELINE</text>

  <text x="860" y="84" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700" letter-spacing="1">VALIDATED</text>
  <text x="860" y="95" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700">TRANSFER</text>

  <!-- Vertical separators -->
  <line x1="180" y1="72" x2="180" y2="408" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="360" y1="72" x2="360" y2="408" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="545" y1="72" x2="545" y2="408" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="770" y1="72" x2="770" y2="408" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Source systems — stacked vertically -->
  <g filter="url(#ds)">
    <rect x="15" y="112" width="150" height="32" rx="5" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="90" y="133" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Originations System</text>
  </g>
  <g filter="url(#ds)">
    <rect x="15" y="152" width="150" height="32" rx="5" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="90" y="173" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Servicing Platform</text>
  </g>
  <g filter="url(#ds)">
    <rect x="15" y="192" width="150" height="32" rx="5" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="90" y="213" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Document Vault</text>
  </g>
  <g filter="url(#ds)">
    <rect x="15" y="232" width="150" height="32" rx="5" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="90" y="253" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">External Vendor</text>
  </g>
  <g filter="url(#ds)">
    <rect x="15" y="272" width="150" height="32" rx="5" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="90" y="293" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Content Mgmt System</text>
  </g>

  <!-- Single horizontal arrow from sources to metadata -->
  <line x1="165" y1="208" x2="195" y2="208" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Central Metadata Repository -->
  <g filter="url(#ds)">
    <rect x="200" y="120" width="140" height="180" rx="8" fill="#1F4E79"/>
    <text x="270" y="155" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Central</text>
    <text x="270" y="172" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Metadata</text>
    <text x="270" y="189" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Repository</text>
    <line x1="220" y1="200" x2="320" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="270" y="218" text-anchor="middle" fill="#c8dff0" font-size="9.5">Customer ID</text>
    <text x="270" y="232" text-anchor="middle" fill="#c8dff0" font-size="9.5">Doc Type · Source</text>
    <text x="270" y="246" text-anchor="middle" fill="#c8dff0" font-size="9.5">Date · Location</text>
    <text x="270" y="275" text-anchor="middle" fill="#c8dff0" font-size="8.5" font-style="italic">Snowflake</text>
  </g>

  <!-- Arrow to Tiers 1 & 2 -->
  <line x1="340" y1="208" x2="370" y2="208" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Tiers 1 & 2 block -->
  <g filter="url(#ds)">
    <rect x="375" y="120" width="160" height="100" rx="8" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="375" y="120" width="160" height="34" rx="8" fill="#1F4E79"/>
    <rect x="375" y="140" width="160" height="14" fill="#1F4E79"/>
    <text x="455" y="142" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Tiers 1 &amp; 2</text>
    <text x="455" y="172" text-anchor="middle" fill="#2C3E50" font-size="10">Deterministic joins</text>
    <text x="455" y="187" text-anchor="middle" fill="#2C3E50" font-size="10">Probabilistic scoring</text>
    <text x="455" y="207" text-anchor="middle" fill="#2A7F62" font-size="14" font-weight="700">~97% matched</text>
  </g>

  <!-- Unmatched residual below -->
  <g filter="url(#ds)">
    <rect x="385" y="240" width="140" height="42" rx="6" fill="#fff5f5" stroke="#c0392b" stroke-width="1.2"/>
    <text x="455" y="258" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">UNMATCHED ~3%</text>
    <text x="455" y="273" text-anchor="middle" fill="#7f8c8d" font-size="9">Hard residual</text>
  </g>

  <!-- Arrow from unmatched to RAG — horizontal, clean -->
  <line x1="525" y1="261" x2="560" y2="261" stroke="#c0392b" stroke-width="1.2"/>
  <line x1="560" y1="261" x2="560" y2="175" stroke="#2A7F62" stroke-width="1.5"/>
  <line x1="560" y1="175" x2="575" y2="175" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#arrT)"/>

  <!-- RAG Pipeline block -->
  <g filter="url(#ds)">
    <rect x="580" y="112" width="180" height="195" rx="8" fill="url(#cg)" stroke="#2A7F62" stroke-width="1.8"/>
    <rect x="580" y="112" width="180" height="34" rx="8" fill="#2A7F62"/>
    <rect x="580" y="133" width="180" height="13" fill="#2A7F62"/>
    <text x="670" y="135" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">RAG Pipeline</text>

    <!-- OCR + Extract -->
    <rect x="596" y="156" width="148" height="24" rx="4" fill="#e8f0fe" stroke="#1F4E79" stroke-width="0.8"/>
    <text x="670" y="172" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">OCR + LLM Extraction</text>

    <!-- PII Tokenization -->
    <rect x="596" y="186" width="148" height="24" rx="4" fill="#fef9e7" stroke="#d4a017" stroke-width="0.8"/>
    <text x="670" y="202" text-anchor="middle" fill="#8a6d00" font-size="9.5" font-weight="600">PII Tokenization</text>

    <!-- R: Retrieve -->
    <rect x="596" y="216" width="148" height="22" rx="4" fill="#e8f5f0" stroke="#2A7F62" stroke-width="0.8"/>
    <text x="670" y="231" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="600">R: Retrieve via vectors</text>

    <!-- A+G: Augment + Generate -->
    <rect x="596" y="244" width="148" height="22" rx="4" fill="#e8f5f0" stroke="#2A7F62" stroke-width="0.8"/>
    <text x="670" y="259" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="600">A+G: Match + explain</text>

    <!-- Confidence routing -->
    <rect x="596" y="272" width="148" height="22" rx="4" fill="#fef9e7" stroke="#d4a017" stroke-width="0.8"/>
    <text x="670" y="287" text-anchor="middle" fill="#8a6d00" font-size="9" font-weight="600">Confidence routing</text>
  </g>

  <!-- HITL below RAG -->
  <g filter="url(#ds)">
    <rect x="595" y="320" width="150" height="42" rx="6" fill="#fef9e7" stroke="#d4a017" stroke-width="1.2"/>
    <text x="670" y="338" text-anchor="middle" fill="#8a6d00" font-size="10" font-weight="700">HUMAN-IN-THE-LOOP</text>
    <text x="670" y="354" text-anchor="middle" fill="#2C3E50" font-size="9.5">Review + approve</text>
  </g>

  <!-- Arrow from RAG to Transfer — clean horizontal -->
  <line x1="760" y1="208" x2="790" y2="208" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Validated Transfer -->
  <g filter="url(#ds)">
    <rect x="795" y="130" width="145" height="120" rx="8" fill="#1F4E79"/>
    <text x="867" y="167" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Validated</text>
    <text x="867" y="184" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Transfer</text>
    <text x="867" y="201" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Package</text>
    <line x1="815" y1="212" x2="920" y2="212" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="867" y="232" text-anchor="middle" fill="#c8dff0" font-size="10">EA80 Format</text>
  </g>

  <!-- Audit trail spanning bottom -->
  <g filter="url(#ds)">
    <rect x="375" y="375" width="565" height="28" rx="5" fill="#e8f0fe" stroke="#1F4E79" stroke-width="1"/>
    <text x="657" y="393" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">Immutable Audit Trail — every match decision logged with method, confidence, explanation</text>
  </g>

  <!-- Bottom bar -->
  <rect x="15" y="412" width="930" height="22" rx="4" fill="#e8f5f0"/>
  <text x="480" y="427" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">Tiers 1 &amp; 2 resolve ~97% via joins &amp; scoring → RAG Pipeline handles the ~3% residual with LLM explanation + human review → all on AWS Bedrock + Snowflake</text>
</svg>
