<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds5" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <linearGradient id="cg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1F4E79"/>
    </marker>
    <marker id="a5t" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2A7F62"/>
    </marker>
    <marker id="a5d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d4a017"/>
    </marker>
  </defs>

  <rect width="960" height="680" fill="#f9fafb" rx="12"/>
  <rect x="0" y="0" width="960" height="56" fill="url(#hg5)" rx="12"/>
  <rect x="0" y="28" width="960" height="28" fill="url(#hg5)"/>
  <text x="480" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Tier 3 RAG Pipeline — Full Architecture</text>

  <!-- Three column labels -->
  <text x="155" y="82" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700" letter-spacing="1">ACCOUNT INDEX (BATCH)</text>
  <text x="480" y="82" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="700" letter-spacing="1">DOCUMENT RAG PIPELINE</text>
  <text x="830" y="82" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700" letter-spacing="1">OUTPUT &amp; GOVERNANCE</text>

  <line x1="310" y1="72" x2="310" y2="645" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="700" y1="72" x2="700" y2="645" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== LEFT COLUMN: Account Index ===== -->
  <g filter="url(#ds5)">
    <rect x="20" y="100" width="270" height="44" rx="6" fill="url(#cg5)" stroke="#1F4E79" stroke-width="1.5"/>
    <text x="155" y="119" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="700">Account Metadata (Snowflake)</text>
    <text x="155" y="136" text-anchor="middle" fill="#7f8c8d" font-size="9.5">~2M accounts with known attributes</text>
  </g>
  <line x1="155" y1="144" x2="155" y2="162" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Labeled text assembly -->
  <g filter="url(#ds5)">
    <rect x="20" y="167" width="270" height="120" rx="6" fill="url(#cg5)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="155" y="187" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="700">Labeled Text Assembly</text>
    <line x1="40" y1="195" x2="270" y2="195" stroke="#e2e8f0" stroke-width="1"/>
    <text x="35" y="212" fill="#1F4E79" font-size="9.5" font-family="'Consolas', monospace">Borrower: James A. Smith</text>
    <text x="35" y="227" fill="#1F4E79" font-size="9.5" font-family="'Consolas', monospace">SSN: 847-29-3651 (tokenized)</text>
    <text x="35" y="242" fill="#1F4E79" font-size="9.5" font-family="'Consolas', monospace">DOB: 293-84-1567 (tokenized)</text>
    <text x="35" y="257" fill="#1F4E79" font-size="9.5" font-family="'Consolas', monospace">Acct: 7821-4039 (tokenized)</text>
    <text x="35" y="272" fill="#1F4E79" font-size="9.5" font-family="'Consolas', monospace">Origination: 2015-03-10</text>
  </g>
  <text x="155" y="299" text-anchor="middle" fill="#7f8c8d" font-size="8.5" font-style="italic">Names in clear text · IDs/DOB/Acct# tokenized</text>
  <line x1="155" y1="306" x2="155" y2="324" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Embedding -->
  <g filter="url(#ds5)">
    <rect x="30" y="329" width="250" height="40" rx="8" fill="#1F4E79"/>
    <text x="155" y="348" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Embedding Model (Bedrock)</text>
    <text x="155" y="363" text-anchor="middle" fill="#c8dff0" font-size="9.5">text → 1536-dim vector</text>
  </g>
  <line x1="155" y1="369" x2="155" y2="387" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- Vector index in Snowflake -->
  <g filter="url(#ds5)">
    <rect x="20" y="392" width="270" height="60" rx="8" fill="#2A7F62"/>
    <text x="155" y="417" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Vector Index (Snowflake)</text>
    <text x="155" y="437" text-anchor="middle" fill="#d4edda" font-size="10">~2M embeddings · native vector column</text>
    <text x="155" y="449" text-anchor="middle" fill="#d4edda" font-size="9.5">Cosine similarity via SQL function</text>
  </g>

  <!-- ===== CENTER COLUMN: Document RAG Pipeline ===== -->
  <!-- Unmatched document in S3 -->
  <g filter="url(#ds5)">
    <rect x="330" y="100" width="250" height="48" rx="8" fill="#fff5f5" stroke="#c0392b" stroke-width="1.5"/>
    <text x="455" y="120" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="700">Unmatched Document (S3)</text>
    <text x="455" y="138" text-anchor="middle" fill="#7f8c8d" font-size="9.5">Scanned PDF, fax, form, correspondence</text>
  </g>
  <line x1="455" y1="148" x2="455" y2="166" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#a5t)"/>

  <!-- OCR: Textract -->
  <g filter="url(#ds5)">
    <rect x="345" y="171" width="220" height="38" rx="6" fill="url(#cg5)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="455" y="195" text-anchor="middle" fill="#1F4E79" font-size="11" font-weight="600">OCR (Amazon Textract)</text>
  </g>
  <line x1="455" y1="209" x2="455" y2="227" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#a5t)"/>

  <!-- LLM Extraction -->
  <g filter="url(#ds5)">
    <rect x="335" y="232" width="240" height="60" rx="8" fill="#1F4E79"/>
    <text x="455" y="255" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">LLM Extraction (Bedrock)</text>
    <text x="455" y="272" text-anchor="middle" fill="#c8dff0" font-size="9.5">Extract: name, SSN, dates, doc type</text>
    <text x="455" y="285" text-anchor="middle" fill="#c8dff0" font-size="9.5">Context-aware across document formats</text>
  </g>
  <line x1="455" y1="292" x2="455" y2="310" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#a5t)"/>

  <!-- PII Tokenization -->
  <g filter="url(#ds5)">
    <rect x="350" y="315" width="210" height="38" rx="6" fill="#fef9e7" stroke="#d4a017" stroke-width="1.5"/>
    <text x="455" y="332" text-anchor="middle" fill="#8a6d00" font-size="10" font-weight="700">PII Tokenization</text>
    <text x="455" y="346" text-anchor="middle" fill="#8a6d00" font-size="9">Format-preserving · same instance as accounts</text>
  </g>
  <line x1="455" y1="353" x2="455" y2="371" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#a5t)"/>

  <!-- Extraction validation -->
  <g filter="url(#ds5)">
    <rect x="350" y="376" width="210" height="38" rx="6" fill="url(#cg5)" stroke="#d4a017" stroke-width="1.2"/>
    <text x="455" y="393" text-anchor="middle" fill="#8a6d00" font-size="10" font-weight="600">Extraction Validation</text>
    <text x="455" y="407" text-anchor="middle" fill="#7f8c8d" font-size="9">Cross-check against source metadata</text>
  </g>
  <line x1="455" y1="414" x2="455" y2="432" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#a5t)"/>

  <!-- R: Retrieve -->
  <g filter="url(#ds5)">
    <rect x="340" y="437" width="230" height="44" rx="8" fill="#2A7F62"/>
    <text x="358" y="458" fill="#ffffff" font-size="12" font-weight="800">R</text>
    <text x="375" y="458" fill="#ffffff" font-size="11" font-weight="700">Retrieve Top-K Candidates</text>
    <text x="455" y="474" text-anchor="middle" fill="#d4edda" font-size="9.5">Vector similarity search in Snowflake</text>
  </g>

  <!-- Arrow from vector index to Retrieve — clean L-shaped -->
  <line x1="290" y1="422" x2="320" y2="422" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="320" y1="422" x2="320" y2="459" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="320" y1="459" x2="340" y2="459" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a5t)"/>

  <line x1="455" y1="481" x2="455" y2="499" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#a5t)"/>

  <!-- A: Augment -->
  <g filter="url(#ds5)">
    <rect x="340" y="504" width="230" height="44" rx="8" fill="#1F4E79"/>
    <text x="358" y="525" fill="#ffffff" font-size="12" font-weight="800">A</text>
    <text x="375" y="525" fill="#ffffff" font-size="11" font-weight="700">Augment LLM Prompt</text>
    <text x="455" y="541" text-anchor="middle" fill="#c8dff0" font-size="9.5">Doc metadata + OCR + candidate profiles</text>
  </g>
  <line x1="455" y1="548" x2="455" y2="566" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- G: Generate -->
  <g filter="url(#ds5)">
    <rect x="340" y="571" width="230" height="52" rx="8" fill="#2A7F62"/>
    <text x="358" y="594" fill="#ffffff" font-size="12" font-weight="800">G</text>
    <text x="375" y="594" fill="#ffffff" font-size="11" font-weight="700">Generate Decision</text>
    <text x="455" y="612" text-anchor="middle" fill="#d4edda" font-size="9.5">Match + confidence + explanation</text>
  </g>

  <!-- Bedrock callout -->
  <g filter="url(#ds5)">
    <rect x="590" y="516" width="100" height="44" rx="6" fill="url(#cg5)" stroke="#1F4E79" stroke-width="1"/>
    <text x="640" y="534" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700">Bedrock</text>
    <text x="640" y="548" text-anchor="middle" fill="#7f8c8d" font-size="8.5">VPC-isolated</text>
    <text x="640" y="559" text-anchor="middle" fill="#7f8c8d" font-size="8.5">Batch API calls</text>
  </g>
  <line x1="590" y1="538" x2="570" y2="538" stroke="#1F4E79" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Output arrow to right column -->
  <line x1="570" y1="597" x2="700" y2="597" stroke="#1F4E79" stroke-width="1"/>
  <line x1="700" y1="597" x2="700" y2="115" stroke="#1F4E79" stroke-width="1"/>
  <line x1="700" y1="115" x2="715" y2="115" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- ===== RIGHT COLUMN: Output & Governance ===== -->
  <!-- Explanation example -->
  <g filter="url(#ds5)">
    <rect x="720" y="100" width="220" height="170" rx="8" fill="url(#cg5)" stroke="#1F4E79" stroke-width="1.2"/>
    <rect x="720" y="100" width="220" height="28" rx="8" fill="#1F4E79"/>
    <rect x="720" y="118" width="220" height="10" fill="#1F4E79"/>
    <text x="830" y="118" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">LLM-Generated Explanation</text>
  </g>
  <text x="735" y="146" fill="#2C3E50" font-size="9" font-weight="600">Document:</text>
  <rect x="735" y="151" width="190" height="24" rx="3" fill="#fff5f5"/>
  <text x="742" y="163" fill="#c0392b" font-size="8">Scanned PNote · OCR: "J. Smith"</text>
  <text x="742" y="173" fill="#c0392b" font-size="8">Created: 2015-03-12 · No CIF/AppID</text>
  <text x="735" y="192" fill="#2C3E50" font-size="9" font-weight="600">Explanation:</text>
  <rect x="735" y="197" width="190" height="58" rx="3" fill="#e8f0fe"/>
  <text x="742" y="210" fill="#1F4E79" font-size="8" font-style="italic">"Matched to Acct #A-8821.</text>
  <text x="742" y="221" fill="#1F4E79" font-size="8" font-style="italic">Borrower 'James Smith' matches</text>
  <text x="742" y="232" fill="#1F4E79" font-size="8" font-style="italic">OCR text. Origination 2015-03-10</text>
  <text x="742" y="243" fill="#1F4E79" font-size="8" font-style="italic">within 2 days. SSN token matches."</text>

  <!-- Document-type-aware scoring -->
  <g filter="url(#ds5)">
    <rect x="720" y="282" width="220" height="88" rx="6" fill="url(#cg5)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="830" y="300" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="700">Doc-Type-Aware Scoring</text>
    <line x1="735" y1="306" x2="925" y2="306" stroke="#e2e8f0" stroke-width="0.8"/>
    <text x="735" y="321" fill="#2A7F62" font-size="8.5" font-weight="600">Driver's License</text>
    <text x="735" y="333" fill="#7f8c8d" font-size="8">Name + DOB match = 2/2 expected → high</text>
    <text x="735" y="349" fill="#c0392b" font-size="8.5" font-weight="600">Promissory Note (no SSN)</text>
    <text x="735" y="361" fill="#7f8c8d" font-size="8">Name + date match = 3/5 expected → medium</text>
  </g>

  <!-- Capacity constraint + threshold -->
  <g filter="url(#ds5)">
    <rect x="720" y="382" width="220" height="76" rx="6" fill="#fef9e7" stroke="#d4a017" stroke-width="1.2"/>
    <text x="830" y="400" text-anchor="middle" fill="#8a6d00" font-size="9.5" font-weight="700">Threshold Calibration</text>
    <line x1="735" y1="406" x2="925" y2="406" stroke="#e8daa0" stroke-width="0.8"/>
    <text x="735" y="420" fill="#2C3E50" font-size="8.5">~6M Tier 3 docs</text>
    <text x="735" y="433" fill="#2C3E50" font-size="8.5">~500 reviewers × 20/day × ~70 days</text>
    <text x="735" y="446" fill="#8a6d00" font-size="8.5" font-weight="600">= ~700K review capacity (~10-12%)</text>
    <text x="735" y="455" fill="#7f8c8d" font-size="7.5" font-style="italic">Auto-accept threshold: ~88-90% of volume</text>
  </g>

  <!-- Auto-accept -->
  <g filter="url(#ds5)">
    <rect x="720" y="470" width="220" height="42" rx="6" fill="#e8f5f0" stroke="#2A7F62" stroke-width="1.2"/>
    <text x="830" y="488" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="700">~88-90% Auto-Accept</text>
    <text x="830" y="504" text-anchor="middle" fill="#7f8c8d" font-size="8.5">Explanation logged · spot-check validated</text>
  </g>

  <!-- Human review -->
  <g filter="url(#ds5)">
    <rect x="720" y="522" width="220" height="50" rx="6" fill="url(#cg5)" stroke="#d4a017" stroke-width="1.2"/>
    <text x="830" y="540" text-anchor="middle" fill="#8a6d00" font-size="9.5" font-weight="700">~10-12% Human Review</text>
    <text x="830" y="555" text-anchor="middle" fill="#2C3E50" font-size="8.5">500 reviewers · ~20 docs/day</text>
    <text x="830" y="567" text-anchor="middle" fill="#7f8c8d" font-size="8">~45 sec/doc with LLM explanation</text>
  </g>

  <!-- Audit trail -->
  <g filter="url(#ds5)">
    <rect x="720" y="584" width="220" height="36" rx="6" fill="#1F4E79"/>
    <text x="830" y="604" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">Immutable Audit Trail</text>
    <text x="830" y="616" text-anchor="middle" fill="#c8dff0" font-size="8.5">Both paths: decision + explanation</text>
  </g>
  <line x1="830" y1="512" x2="830" y2="522" stroke="#7f8c8d" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="830" y1="572" x2="830" y2="584" stroke="#7f8c8d" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Bottom bar -->
  <rect x="20" y="650" width="920" height="22" rx="4" fill="#e8f0fe"/>
  <text x="480" y="665" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">Full pipeline: Textract → Bedrock (extract) → tokenize → Bedrock (embed) → Snowflake (vector search) → Bedrock (match + explain) → audit</text>
</svg>
