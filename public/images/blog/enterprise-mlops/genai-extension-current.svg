<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/><stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2A7F62"/>
    </marker>
    <marker id="arrN" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1F4E79"/>
    </marker>
  </defs>

  <rect width="960" height="420" fill="#f9fafb" rx="12"/>
  <rect x="0" y="0" width="960" height="56" fill="url(#hg)" rx="12"/>
  <rect x="0" y="28" width="960" height="28" fill="url(#hg)"/>
  <text x="480" y="30" text-anchor="middle" fill="#fff" font-size="17" font-weight="700" letter-spacing="0.5">Extending the Existing ML Platform to GenAI — Foundation Established</text>
  <text x="480" y="48" text-anchor="middle" fill="#fff" font-size="10" opacity="0.8">How the dashed GenAI branch from the core platform (Figure 1) works today</text>

  <!-- REUSED PLATFORM COMPONENTS — left column -->
  <text x="40" y="80" fill="#1F4E79" font-size="10" font-weight="700">REUSED FROM CORE PLATFORM</text>
  <text x="268" y="80" fill="#1F4E79" font-size="8" opacity="0.6">(same infrastructure as traditional ML)</text>

  <rect x="40" y="92" width="170" height="65" rx="8" fill="#1F4E79" filter="url(#ds)" opacity="0.85"/>
  <text x="125" y="114" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">AWS Bedrock</text>
  <text x="125" y="130" text-anchor="middle" fill="#B0C4DE" font-size="8.5">VPC Endpoint / PrivateLink</text>
  <text x="125" y="144" text-anchor="middle" fill="#B0C4DE" font-size="8.5">Data never leaves network</text>

  <rect x="222" y="92" width="145" height="65" rx="8" fill="#fff" stroke="#2C3E50" stroke-width="1.5" filter="url(#ds)"/>
  <text x="294" y="110" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="700">Snowflake</text>
  <text x="294" y="125" text-anchor="middle" fill="#888" font-size="8" font-style="italic">Existing data foundation</text>
  <text x="294" y="139" text-anchor="middle" fill="#888" font-size="8">Vectors, structured data</text>
  <text x="294" y="152" text-anchor="middle" fill="#888" font-size="8">Audit trail storage</text>

  <rect x="379" y="92" width="115" height="65" rx="8" fill="#fff" stroke="#2C3E50" stroke-width="1.5" filter="url(#ds)"/>
  <text x="436" y="110" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="700">Amazon S3</text>
  <text x="436" y="125" text-anchor="middle" fill="#888" font-size="8" font-style="italic">Existing artifact store</text>
  <text x="436" y="139" text-anchor="middle" fill="#888" font-size="8">Documents, transcripts</text>
  <text x="436" y="152" text-anchor="middle" fill="#888" font-size="8">Model artifacts</text>

  <rect x="506" y="92" width="170" height="65" rx="8" fill="#fff" stroke="#2C3E50" stroke-width="1.5" filter="url(#ds)"/>
  <text x="591" y="110" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="700">PII Tokenization</text>
  <text x="591" y="125" text-anchor="middle" fill="#888" font-size="8" font-style="italic">Same on-prem pattern as ML</text>
  <text x="591" y="139" text-anchor="middle" fill="#888" font-size="8">SSN, DOB, Card# tokenized</text>
  <text x="591" y="152" text-anchor="middle" fill="#888" font-size="8">before reaching cloud</text>

  <!-- GENAI-SPECIFIC CONTROLS — right -->
  <text x="700" y="80" fill="#8B6914" font-size="10" font-weight="700">GENAI-SPECIFIC</text>

  <rect x="700" y="92" width="230" height="65" rx="8" fill="#8B6914" opacity="0.08" stroke="#8B6914" stroke-width="1.5"/>
  <text x="815" y="112" text-anchor="middle" fill="#6B5311" font-size="10" font-weight="700">Governed Intake + Basic Controls</text>
  <text x="815" y="130" text-anchor="middle" fill="#5A4510" font-size="8.5">Risk assessment at use-case submission</text>
  <text x="815" y="144" text-anchor="middle" fill="#5A4510" font-size="8.5">PII scan (input + output) · HITL routing</text>
  <text x="815" y="155" text-anchor="middle" fill="#5A4510" font-size="8.5">Audit logging per invocation</text>

  <!-- USE CASES -->
  <text x="40" y="182" fill="#2A7F62" font-size="11" font-weight="700">USE CASES PROVEN ON THIS INFRASTRUCTURE</text>

  <!-- Use case 1 -->
  <rect x="40" y="196" width="285" height="88" rx="8" fill="#2A7F62" opacity="0.08" stroke="#2A7F62" stroke-width="1.5" filter="url(#ds)"/>
  <text x="182" y="218" text-anchor="middle" fill="#2A7F62" font-size="11" font-weight="700">Document Matching at Scale</text>
  <text x="182" y="236" text-anchor="middle" fill="#2C3E50" font-size="9">RAG pipeline: vector search + LLM matching</text>
  <text x="182" y="250" text-anchor="middle" fill="#2C3E50" font-size="9">~200M documents, HITL validation, full audit trail</text>
  <text x="182" y="264" text-anchor="middle" fill="#888" font-size="8">Pattern: project-based, governed one-time execution</text>
  <text x="182" y="278" text-anchor="middle" fill="#2A7F62" font-size="8" font-style="italic">/blog/document-migration-at-scale</text>

  <!-- Use case 2 -->
  <rect x="337" y="196" width="285" height="88" rx="8" fill="#2A7F62" opacity="0.08" stroke="#2A7F62" stroke-width="1.5" filter="url(#ds)"/>
  <text x="479" y="218" text-anchor="middle" fill="#2A7F62" font-size="11" font-weight="700">LLM-Assisted SQL Modernization</text>
  <text x="479" y="236" text-anchor="middle" fill="#2C3E50" font-size="9">Claude via Bedrock + Snowflake EXPLAIN plans</text>
  <text x="479" y="250" text-anchor="middle" fill="#2C3E50" font-size="9">Equivalence testing, HITL review</text>
  <text x="479" y="264" text-anchor="middle" fill="#888" font-size="8">Pattern: project-based, governed one-time execution</text>
  <text x="479" y="278" text-anchor="middle" fill="#2A7F62" font-size="8" font-style="italic">/blog/llm-sql-modernization</text>

  <!-- Use case 3 — HIGHLIGHTED as strongest ML tie-in -->
  <rect x="634" y="196" width="295" height="88" rx="8" fill="#2A7F62" opacity="0.12" stroke="#2A7F62" stroke-width="2" filter="url(#ds)"/>
  <text x="781" y="218" text-anchor="middle" fill="#2A7F62" font-size="11" font-weight="700">Call Center Intelligence</text>
  <text x="781" y="236" text-anchor="middle" fill="#2C3E50" font-size="9">LLM summarization alongside ML complaint detection</text>
  <text x="781" y="250" text-anchor="middle" fill="#2C3E50" font-size="9">Recurring batch cadence — the one production GenAI use case</text>
  <text x="781" y="264" text-anchor="middle" fill="#1F4E79" font-size="8" font-weight="600">Strongest tie to hero pipeline: GenAI + ML in same workflow</text>
  <text x="781" y="278" text-anchor="middle" fill="#2A7F62" font-size="8" font-style="italic">/blog/ml-call-center</text>

  <!-- WHAT THE PLATFORM REUSES -->
  <rect x="40" y="300" width="440" height="50" rx="8" fill="#1F4E79" opacity="0.06" stroke="#1F4E79" stroke-width="1"/>
  <text x="60" y="320" fill="#1F4E79" font-size="10" font-weight="700">SAME AS CORE ML PLATFORM</text>
  <text x="60" y="338" fill="#1F4E79" font-size="9">Cloud/network boundary  ·  Audit logging  ·  PII controls  ·  Operational support model  ·  Data foundation</text>

  <!-- WHAT'S MISSING — bridge to Figure 7 -->
  <rect x="500" y="300" width="430" height="50" rx="8" fill="#fff" stroke="#2C3E50" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="520" y="320" fill="#2C3E50" font-size="10" font-weight="700">MISSING TO REACH ENTERPRISE LLMOps</text>
  <text x="520" y="338" fill="#2C3E50" font-size="9">Prompt versioning  ·  Multi-model gateway  ·  Centralized guardrails  ·  Evals framework  ·  LLM observability</text>

  <!-- Honest assessment -->
  <rect x="40" y="365" width="890" height="42" rx="8" fill="#fff" stroke="#2C3E50" stroke-width="1"/>
  <text x="70" y="384" fill="#2C3E50" font-size="10" font-weight="700">HONEST ASSESSMENT</text>
  <text x="260" y="384" fill="#2C3E50" font-size="9.5">Foundation established. Pattern proven on high-impact use cases. This is not yet enterprise LLMOps at scale —</text>
  <text x="70" y="400" fill="#2C3E50" font-size="9.5">it is a governed intake and risk-assessment model with basic operational monitoring, extending the existing platform to a new class of workloads.</text>
</svg>
