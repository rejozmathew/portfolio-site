<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/><stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1F4E79"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2A7F62"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C0392B"/>
    </marker>
  </defs>

  <rect width="960" height="470" fill="#f9fafb" rx="12"/>
  <rect x="0" y="0" width="960" height="52" fill="url(#hg)" rx="12"/>
  <rect x="0" y="26" width="960" height="26" fill="url(#hg)"/>
  <text x="480" y="34" text-anchor="middle" fill="#fff" font-size="17" font-weight="700" letter-spacing="0.5">Code Promotion — From Notebook to Governed Production</text>

  <!-- Three environments -->
  <rect x="40" y="64" width="215" height="22" rx="4" fill="#E8F0FE"/>
  <text x="147" y="79" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">DEV / TRAIN (Workbench)</text>
  <rect x="280" y="64" width="420" height="22" rx="4" fill="#8B6914" opacity="0.12"/>
  <text x="490" y="79" text-anchor="middle" fill="#6B5311" font-size="10" font-weight="700">STAGING — Automated Governance Gates (Jenkins)</text>
  <rect x="725" y="64" width="210" height="22" rx="4" fill="#E8F5EE"/>
  <text x="830" y="79" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="700">PRODUCTION</text>

  <!-- Dev box -->
  <rect x="40" y="100" width="215" height="105" rx="8" fill="#2A7F62" filter="url(#ds)"/>
  <text x="147" y="125" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">DS Workbench</text>
  <text x="147" y="144" text-anchor="middle" fill="#B0DFCF" font-size="9">Train model in notebook</text>
  <text x="147" y="160" text-anchor="middle" fill="#B0DFCF" font-size="9">Evaluate against baseline</text>
  <text x="147" y="176" text-anchor="middle" fill="#B0DFCF" font-size="9">Refactor to Python package</text>
  <text x="147" y="194" text-anchor="middle" fill="#B0DFCF" font-size="8" font-style="italic">MLflow logs every experiment</text>

  <!-- Arrow to staging -->
  <line x1="261" y1="152" x2="290" y2="152" stroke="#1F4E79" stroke-width="2" marker-end="url(#arr)"/>
  <text x="275" y="143" fill="#1F4E79" font-size="8" font-weight="600" text-anchor="middle">Submit</text>

  <!-- Gate boxes in staging -->
  <rect x="298" y="100" width="92" height="105" rx="6" fill="#fff" stroke="#1F4E79" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="298" y="100" width="92" height="24" rx="6" fill="#1F4E79"/>
  <text x="344" y="116" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">GATE 1</text>
  <text x="344" y="140" text-anchor="middle" fill="#2C3E50" font-size="9" font-weight="600">Unit Tests</text>
  <text x="344" y="155" text-anchor="middle" fill="#888" font-size="8">Code runs?</text>
  <text x="344" y="168" text-anchor="middle" fill="#888" font-size="8">Schema valid?</text>
  <text x="344" y="181" text-anchor="middle" fill="#888" font-size="8">Features consumed?</text>
  <text x="344" y="198" text-anchor="middle" fill="#2A7F62" font-size="8" font-weight="700">All tiers</text>

  <line x1="396" y1="152" x2="410" y2="152" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="418" y="100" width="92" height="105" rx="6" fill="#fff" stroke="#8B6914" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="418" y="100" width="92" height="24" rx="6" fill="#8B6914"/>
  <text x="464" y="116" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">GATE 2</text>
  <text x="464" y="140" text-anchor="middle" fill="#2C3E50" font-size="9" font-weight="600">Validation</text>
  <text x="464" y="155" text-anchor="middle" fill="#888" font-size="8">Performance thresholds?</text>
  <text x="464" y="168" text-anchor="middle" fill="#888" font-size="8">Regulatory / RA checks?</text>
  <text x="464" y="181" text-anchor="middle" fill="#888" font-size="8">Explainability?</text>
  <text x="464" y="198" text-anchor="middle" fill="#8B6914" font-size="8" font-weight="600" font-style="italic">Use-case aware</text>

  <line x1="516" y1="152" x2="530" y2="152" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="538" y="100" width="92" height="105" rx="6" fill="#fff" stroke="#1F4E79" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="538" y="100" width="92" height="24" rx="6" fill="#1F4E79"/>
  <text x="584" y="116" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">GATE 3</text>
  <text x="584" y="140" text-anchor="middle" fill="#2C3E50" font-size="9" font-weight="600">Readiness</text>
  <text x="584" y="155" text-anchor="middle" fill="#888" font-size="8">Features healthy?</text>
  <text x="584" y="168" text-anchor="middle" fill="#888" font-size="8">Model card complete?</text>
  <text x="584" y="181" text-anchor="middle" fill="#888" font-size="8">Risk tier approval?</text>
  <text x="584" y="198" text-anchor="middle" fill="#888" font-size="8" font-style="italic">MRM sign-off scales</text>

  <line x1="636" y1="152" x2="650" y2="152" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Registry -->
  <rect x="658" y="110" width="80" height="85" rx="6" fill="#2C3E50" filter="url(#ds)"/>
  <text x="698" y="138" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">MLflow</text>
  <text x="698" y="154" text-anchor="middle" fill="#AAB7C4" font-size="9">Registry</text>
  <text x="698" y="172" text-anchor="middle" fill="#AAB7C4" font-size="8">Version</text>
  <text x="698" y="184" text-anchor="middle" fill="#AAB7C4" font-size="8">Approvals</text>

  <line x1="744" y1="152" x2="770" y2="152" stroke="#2A7F62" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Production -->
  <rect x="778" y="110" width="155" height="85" rx="8" fill="#2A7F62" filter="url(#ds)"/>
  <text x="855" y="138" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">PRODUCTION</text>
  <text x="855" y="158" text-anchor="middle" fill="#B0DFCF" font-size="9">Batch (Airflow)</text>
  <text x="855" y="174" text-anchor="middle" fill="#B0DFCF" font-size="9">Real-Time (API)</text>
  <text x="855" y="190" text-anchor="middle" fill="#B0DFCF" font-size="9">GenAI (Bedrock)</text>

  <!-- Reject path -->
  <path d="M 464 211 L 464 240 L 147 240 L 147 211" stroke="#C0392B" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrR)"/>
  <text x="305" y="255" text-anchor="middle" fill="#C0392B" font-size="9.5" font-weight="600">Any gate fails → Rejected back to Dev for remediation</text>

  <!-- Risk Tier section - FACTOR DRIVEN -->
  <rect x="40" y="278" width="890" height="178" rx="8" fill="#fff" stroke="#8B6914" stroke-width="1" filter="url(#ds)"/>
  <text x="70" y="302" fill="#6B5311" font-size="12" font-weight="700">Risk Tier Determines Governance Intensity</text>

  <!-- Factor explanation -->
  <rect x="55" y="315" width="415" height="55" rx="6" fill="#8B6914" opacity="0.06"/>
  <text x="70" y="334" fill="#6B5311" font-size="10" font-weight="700">Tier is factor-driven, not category-driven:</text>
  <text x="70" y="350" fill="#5A4510" font-size="9">Materiality (financial impact) + Reliance (decision criticality, regulatory exposure)</text>
  <text x="70" y="364" fill="#5A4510" font-size="9">+ Complexity (methodology, data source). Model owner proposes; MRM reviews and can adjust.</text>

  <!-- What scales vs what's constant -->
  <rect x="490" y="315" width="425" height="55" rx="6" fill="#8B6914" opacity="0.06"/>
  <text x="505" y="334" fill="#6B5311" font-size="10" font-weight="700">What scales vs what's constant:</text>
  <text x="505" y="350" fill="#5A4510" font-size="9">Constant: pipeline structure, audit trail, monitoring plan requirement, MRM oversight</text>
  <text x="505" y="364" fill="#5A4510" font-size="9">Scales: gate depth, approval requirements, validation intensity, monitoring frequency</text>

  <!-- Illustrative examples -->
  <text x="70" y="395" fill="#6B5311" font-size="10" font-weight="600" font-style="italic">Illustrative examples (actual tier depends on factor assessment, not model category):</text>

  <!-- High risk -->
  <rect x="55" y="405" width="275" height="40" rx="6" fill="#8B6914" opacity="0.07" stroke="#8B6914" stroke-width="1"/>
  <text x="192" y="422" text-anchor="middle" fill="#6B5311" font-size="9" font-weight="700">Higher Risk (typical):</text>
  <text x="192" y="438" text-anchor="middle" fill="#5A4510" font-size="8.5">Pricing, fraud decisioning, underwriting — full MRM review</text>

  <!-- Moderate risk -->
  <rect x="345" y="405" width="275" height="40" rx="6" fill="#8B6914" opacity="0.05" stroke="#8B6914" stroke-width="1"/>
  <text x="482" y="422" text-anchor="middle" fill="#6B5311" font-size="9" font-weight="700">Moderate Risk (typical):</text>
  <text x="482" y="438" text-anchor="middle" fill="#5A4510" font-size="8.5">Marketing, segmentation, complaint detection — structured review</text>

  <!-- Lower risk -->
  <rect x="635" y="405" width="275" height="40" rx="6" fill="#8B6914" opacity="0.03" stroke="#8B6914" stroke-width="1"/>
  <text x="772" y="422" text-anchor="middle" fill="#6B5311" font-size="9" font-weight="700">Lower Risk (typical):</text>
  <text x="772" y="438" text-anchor="middle" fill="#5A4510" font-size="8.5">Internal tools, SQL modernization — automated gates, owner review</text>
</svg>
