<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/><stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1F4E79"/>
    </marker>
    <marker id="arrT" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2A7F62"/>
    </marker>
  </defs>

  <rect width="960" height="400" fill="#f9fafb" rx="12"/>
  <rect x="0" y="0" width="960" height="52" fill="url(#hg)" rx="12"/>
  <rect x="0" y="26" width="960" height="26" fill="url(#hg)"/>
  <text x="480" y="34" text-anchor="middle" fill="#fff" font-size="17" font-weight="700" letter-spacing="0.5">Feature Store — The Contract Between Engineering and Science</text>

  <!-- Source systems (left) -->
  <text x="60" y="84" fill="#2C3E50" font-size="11" font-weight="700">SOURCES</text>
  <rect x="40" y="96" width="185" height="42" rx="6" fill="#fff" stroke="#2C3E50" stroke-width="1.5" filter="url(#ds)"/>
  <text x="132" y="121" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Snowflake (Warehouse)</text>
  <rect x="40" y="148" width="185" height="42" rx="6" fill="#fff" stroke="#2C3E50" stroke-width="1.5" filter="url(#ds)"/>
  <text x="132" y="173" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Identity Graph (Neo4j)</text>
  <rect x="40" y="200" width="185" height="42" rx="6" fill="#fff" stroke="#2C3E50" stroke-width="1.5" filter="url(#ds)"/>
  <text x="132" y="225" text-anchor="middle" fill="#2C3E50" font-size="10" font-weight="600">Derived / Engineered</text>

  <!-- Arrows into Feast -->
  <line x1="231" y1="117" x2="310" y2="170" stroke="#2C3E50" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="231" y1="169" x2="310" y2="180" stroke="#2C3E50" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="231" y1="221" x2="310" y2="192" stroke="#2C3E50" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Central Feast box -->
  <rect x="320" y="110" width="180" height="140" rx="8" fill="#1F4E79" filter="url(#ds)"/>
  <text x="410" y="140" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Feast</text>
  <text x="410" y="160" text-anchor="middle" fill="#B0C4DE" font-size="9">Feature definitions</text>
  <text x="410" y="176" text-anchor="middle" fill="#B0C4DE" font-size="9">Transformation pipelines</text>
  <text x="410" y="192" text-anchor="middle" fill="#B0C4DE" font-size="9">Entity registry</text>
  <text x="410" y="208" text-anchor="middle" fill="#B0C4DE" font-size="9">Materialization schedules</text>
  <text x="410" y="240" text-anchor="middle" fill="#B0C4DE" font-size="8" font-style="italic">Each feature: owner, SLA, lineage, quality checks</text>

  <!-- Two output paths -->
  <!-- Offline (top) -->
  <line x1="506" y1="150" x2="590" y2="110" stroke="#1F4E79" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="598" y="80" width="180" height="60" rx="8" fill="#1F4E79" filter="url(#ds)" opacity="0.85"/>
  <text x="688" y="104" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Offline Store</text>
  <text x="688" y="120" text-anchor="middle" fill="#B0C4DE" font-size="9">Historical, point-in-time correct</text>
  <text x="688" y="134" text-anchor="middle" fill="#B0C4DE" font-size="9">No data leakage</text>

  <!-- Offline consumers -->
  <line x1="784" y1="100" x2="832" y2="86" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="840" y="84" fill="#1F4E79" font-size="10" font-weight="600">→ Training (Workbench)</text>
  <line x1="784" y1="120" x2="832" y2="126" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="840" y="126" fill="#1F4E79" font-size="10" font-weight="600">→ Batch Scoring (Airflow)</text>

  <!-- Online (bottom) -->
  <line x1="506" y1="210" x2="590" y2="240" stroke="#2A7F62" stroke-width="2" marker-end="url(#arrT)"/>
  <rect x="598" y="216" width="180" height="60" rx="8" fill="#2A7F62" filter="url(#ds)" opacity="0.85"/>
  <text x="688" y="240" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Online Store</text>
  <text x="688" y="256" text-anchor="middle" fill="#B0DFCF" font-size="9">Latest values, low-latency</text>
  <text x="688" y="270" text-anchor="middle" fill="#B0DFCF" font-size="9">Key-value lookup, milliseconds</text>

  <!-- Online consumers -->
  <line x1="784" y1="236" x2="832" y2="228" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#arrT)"/>
  <text x="840" y="228" fill="#2A7F62" font-size="10" font-weight="600">→ Fraud API (Real-Time)</text>
  <line x1="784" y1="260" x2="832" y2="266" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#arrT)"/>
  <text x="840" y="266" fill="#2A7F62" font-size="10" font-weight="600">→ NBA Engine (Real-Time)</text>

  <!-- Data Observability bar -->
  <rect x="40" y="310" width="890" height="72" rx="8" fill="#8B6914" opacity="0.07" stroke="#8B6914" stroke-width="1.5"/>
  <text x="70" y="334" fill="#6B5311" font-size="11" font-weight="700">DATA OBSERVABILITY — Feature Health Monitoring</text>
  <text x="120" y="356" fill="#5A4510" font-size="10">Freshness SLAs met?</text>
  <text x="310" y="356" fill="#5A4510" font-size="10">Distribution drift?</text>
  <text x="480" y="356" fill="#5A4510" font-size="10">Null / schema changes?</text>
  <text x="670" y="356" fill="#5A4510" font-size="10">Volume as expected?</text>
  <text x="120" y="374" fill="#5A4510" font-size="9" font-style="italic">Breach SLA → Alert → ServiceNow ticket → Investigate before downstream models are affected</text>
</svg>
