name: Docker Publish

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_CONFIG: ${{ runner.temp }}/.docker

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare isolated Docker config
        run: mkdir -p "$DOCKER_CONFIG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/portfolio-site:latest
            ghcr.io/${{ github.repository_owner }}/portfolio-site:run-${{ github.run_number }}
            ghcr.io/${{ github.repository_owner }}/portfolio-site:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
